12_events)}\"\n    \n    event = july_12_events[0]\n    assert event[\"start_datetime\"] == \"2026-07-12T13:00:00Z\", \\\n        f\"Event on 2026-07-12 has wrong start time: {event['start_datetime']}\"\n    assert event[\"end_datetime\"] == \"2026-07-12T15:30:00Z\", \\\n        f\"Event on 2026-07-12 has wrong end time: {event['end_datetime']}\"\n\n\ndef test_new_event_on_july_19():\n    data = _load_snapshot()\n    events = data[\"calendar\"][\"events\"]\n    fm_events = _find_farmers_market_events(events)\n    \n    july_19_events = [e for e in fm_events if e.get(\"start_datetime\", \"\").startswith(\"2026-07-19\")]\n    if not july_19_events:\n        pytest.skip(\"No Farmers market event on 2026-07-19; agent may have interpreted 'next few weeks' as fewer weeks\")\n    \n    assert len(july_19_events) == 1, f\"Expected at most 1 event on 2026-07-19, found {len(july_19_events)}\"\n    \n    event = july_19_events[0]\n    assert event[\"start_datetime\"] == \"2026-07-19T13:00:00Z\", \\\n        f\"Event on 2026-07-19 has wrong start time: {event['start_datetime']}\"\n    assert event[\"end_datetime\"] == \"2026-07-19T15:30:00Z\", \\\n        f\"Event on 2026-07-19 has wrong end time: {event['end_datetime']}\"\n\n\ndef test_new_event_on_july_26():\n    data = _load_snapshot()\n    events = data[\"calendar\"][\"events\"]\n    fm_events = _find_farmers_market_events(events)\n    \n    if len(fm_events) < 7:\n        pytest.skip(f\"Only {len(fm_events)} Farmers market events total; skipping July 26 check since agent created fewer than 6 new events\")\n    \n    july_26_events = [e for e in fm_events if e.get(\"start_datetime\", \"\").startswith(\"2026-07-26\")]\n    assert len(july_26_events) == 1, f\"Expected 1 event on 2026-07-26, found {len(july_26_events)}\"\n    \n    event = july_26_events[0]\n    assert event[\"start_datetime\"] == \"2026-07-26T13:00:00Z\", \\\n        f\"Event on 2026-07-26 has wrong start time: {event['start_datetime']}\"\n    assert event[\"end_datetime\"] == \"2026-07-26T15:30:00Z\", \\\n        f\"Event on 2026-07-26 has wrong end time: {event['end_datetime']}\"\n\n\ndef test_all_new_events_match_template_location():\n    data = _load_snapshot()\n    events = data[\"calendar\"][\"events\"]\n    fm_events = _find_farmers_market_events(events)\n    \n    # All events should have the same location as the existing one\n    for event in fm_events:\n        assert event.get(\"location\") == \"Tower Grove Park, 4256 Magnolia Ave, St. Louis, MO 63110\", \\\n            f\"Event on {event.get('start_datetime')} has wrong location: {event.get('location')}\"\n\n\ndef test_all_new_events_match_template_description():\n    data = _load_snapshot()\n    events = data[\"calendar\"][\"events\"]\n    fm_events = _find_farmers_market_events(events)\n    \n    # All events should have the same description as the existing one\n    for event in fm_events:\n        assert event.get(\"description\") == \"Tower Grove Park\", \\\n            f\"Event on {event.get('start_datetime')} has wrong description: {event.get('description')}\"\n\n\ndef test_all_new_events_match_template_attendees():\n    data = _load_snapshot()\n    events = data[\"calendar\"][\"events\"]\n    fm_events = _find_farmers_market_events(events)\n    \n    expected_attendees = {\"Jose Manuel Ortiz\", \"Carmen Ortiz\"}\n    \n    for event in fm_events:\n        attendees = set(event.get(\"attendees\", []))\n        assert attendees == expected_attendees, \\\n            f\"Event on {event.get('start_datetime')} has wrong attendees: {attendees} vs {expected_attendees}\"\n\n\ndef test_all_new_events_match_template_tag():\n    data = _load_snapshot()\n    events = data[\"calendar\"][\"events\"]\n    fm_events = _find_farmers_market_events(events)\n    \n    for event in fm_events:\n        assert event.get(\"tag\") == \"personal\", \\\n            f\"Event on {event.get('start_datetime')} has wrong tag: {event.get('tag')}\"\n\n\ndef test_file_artifact_exists():\n    found = False\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*\"):\n            if path.is_file():\n                # Look for calendar-related files (ics, csv, json, etc.)\n                if any(ext in path.suffix.lower() for ext in ['.ics', '.csv', '.json', '.txt', '.md']):\n                    found = True\n                    break\n        if found:\n            break\n    \n    assert found, \"No file artifact found in workspace - task requires sending a file the user can add\"\n\n\nif __name__ == \"__main__\":\n    pytest.main([str(Path(__file__).resolve()), \"-rA\", \"--tb=short\"])\n"}, "summary": {"rubric_edits": 127, "rubric_deletes": 70, "test_edits": 134, "test_deletes": 16, "test_files": 42, "tasks": 66}}</script>
<script>
const DATA = JSON.parse(document.getElementById('DATA').textContent);
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function sevTag(s){ s=(s||'').toLowerCase(); if(s!=='major'&&s!=='minor') return s?`<span class="cat">${esc(s)}</span>`:''; return `<span class="sev ${s}">${s}</span>`; }
function cats(s){ if(!s) return ''; return s.split(',').map(c=>c.trim()).filter(Boolean).map(c=>`<span class="cat">${esc(c)}</span>`).join(''); }
function hl(text, q){ text=esc(text); if(!q) return text; const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'); return text.replace(re,'<mark>$1</mark>'); }

const state = { tab:'overview', q:'', sev:'all' };

const TABS = [
  {id:'overview', label:'Overview', count:null},
  {id:'rubric_edits', label:'Rubric Edits', count:DATA.csv.rubric_edits.rows.length},
  {id:'rubric_deletes', label:'Rubric Deletes', count:DATA.csv.rubric_deletes.rows.length},
  {id:'test_edits', label:'Test Edits', count:DATA.csv.test_edits.rows.length},
  {id:'test_deletes', label:'Test Deletes', count:DATA.csv.test_deletes.rows.length},
  {id:'test_files', label:'Test Files', count:Object.keys(DATA.test_files).length},
];

function renderHeader(){
  document.getElementById('subtitle').textContent =
    `Generated ${DATA.generated} · source: ${DATA.source}`;
  const s = DATA.summary;
  document.getElementById('summary').innerHTML = [
    ['Rubric edits', s.rubric_edits],['Rubric deletes', s.rubric_deletes],
    ['Test edits', s.test_edits],['Test deletes', s.test_deletes],
    ['Rewritten files', s.test_files],['Tasks touched', s.tasks],
  ].map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}

function renderNav(){
  document.getElementById('nav').innerHTML = TABS.map(t=>
    `<button data-tab="${t.id}" class="${state.tab===t.id?'active':''}">${t.label}`+
    (t.count!=null?`<span class="badge">${t.count}</span>`:'')+`</button>`).join('');
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;state.q='';state.sev='all';render();});
}

function toolbar(placeholder, withSev){
  return `<div class="toolbar">
    <input type="search" id="q" placeholder="${placeholder}" value="${esc(state.q)}">
    ${withSev?`<select id="sev">
      <option value="all">All severities</option>
      <option value="major">Major only</option>
      <option value="minor">Minor only</option></select>`:''}
    <span class="count" id="count"></span></div>`;
}
function wireToolbar(filterFn){
  const q=document.getElementById('q'); if(q){q.oninput=()=>{state.q=q.value;filterFn();}; q.focus(); q.setSelectionRange(q.value.length,q.value.length);}
  const sev=document.getElementById('sev'); if(sev){sev.value=state.sev; sev.onchange=()=>{state.sev=sev.value;filterFn();};}
}
function match(row){
  const q=state.q.toLowerCase();
  if(state.sev!=='all' && (row.severity||'').toLowerCase()!==state.sev) return false;
  if(!q) return true;
  return Object.values(row).some(v=>String(v).toLowerCase().includes(q));
}

function rubricEditCard(r){
  const q=state.q;
  return `<div class="card">
    <div class="top"><span class="tid">${esc(r.task_id)}</span>${sevTag(r.severity)}${cats(r.categories)}</div>
    <div class="diff">
      <div class="col old"><div class="lbl">old rubric</div><div class="val">${hl(r.old_rubric,q)}</div></div>
      <div class="col new"><div class="lbl">new rubric</div><div class="val">${hl(r.new_rubric,q)}</div></div>
    </div>
    ${r.flagged_issue?`<div class="field"><div class="lbl">flagged issue</div><div class="reason">${hl(r.flagged_issue,q)}</div></div>`:''}
    ${r.edit_justification?`<div class="field"><div class="lbl">edit justification</div><div class="just">${hl(r.edit_justification,q)}</div></div>`:''}
  </div>`;
}
function rubricDeleteCard(r){
  const q=state.q;
  return `<div class="card">
    <div class="top"><span class="tid">${esc(r.task_id)}</span>${sevTag(r.severity)}${cats(r.categories)}</div>
    <div class="field"><div class="lbl">rubric to delete</div><div class="val">${hl(r.rubric_to_delete,q)}</div></div>
    ${r.deletion_reason?`<div class="field"><div class="lbl">deletion reason</div><div class="reason">${hl(r.deletion_reason,q)}</div></div>`:''}
  </div>`;
}
function testCard(r, reasonKey){
  const q=state.q;
  return `<div class="card">
    <div class="top"><span class="tid">${esc(r.task_id)}</span><span class="tname">${esc(r.test_name)}</span>${sevTag(r.severity)}${cats(r.categories)}</div>
    ${r[reasonKey]?`<div class="field"><div class="lbl">${reasonKey.replace('_',' ')}</div><div class="reason">${hl(r[reasonKey],q)}</div></div>`:''}
  </div>`;
}

function renderListTab(key, cardFn, withSev){
  const rows=DATA.csv[key].rows;
  const ph = `Search ${rows.length} ${key.replace('_',' ')}…`;
  let main = toolbar(ph, withSev) + `<div id="list"></div>`;
  document.getElementById('main').innerHTML = main;
  const draw=()=>{
    const filtered=rows.filter(match);
    document.getElementById('list').innerHTML = filtered.length
      ? filtered.map(cardFn).join('') : `<div class="empty">No matches.</div>`;
    document.getElementById('count').textContent = `${filtered.length} of ${rows.length}`;
  };
  wireToolbar(draw); draw();
}

function renderFiles(){
  const files=DATA.test_files; const names=Object.keys(files).sort();
  document.getElementById('main').innerHTML =
    toolbar(`Filter ${names.length} test files…`, false) +
    `<div class="files"><div class="filelist" id="fl"></div>
      <div class="codepane"><div class="hd" id="ch">select a file</div><pre id="cp"></pre></div></div>`;
  const drawList=()=>{
    const q=state.q.toLowerCase();
    const shown=names.filter(n=>n.toLowerCase().includes(q));
    document.getElementById('fl').innerHTML = shown.length
      ? shown.map(n=>`<div class="fi" data-f="${esc(n)}">${esc(n)}</div>`).join('')
      : `<div class="empty">No files.</div>`;
    document.getElementById('count').textContent = `${shown.length} of ${names.length}`;
    document.querySelectorAll('#fl .fi').forEach(el=>el.onclick=()=>open(el.dataset.f));
    if(shown.length) open(state.openFile && shown.includes(state.openFile)?state.openFile:shown[0]);
  };
  const open=(n)=>{
    state.openFile=n;
    document.querySelectorAll('#fl .fi').forEach(el=>el.classList.toggle('active',el.dataset.f===n));
    document.getElementById('ch').textContent = `unit_tests/${n}`;
    document.getElementById('cp').textContent = files[n];
  };
  wireToolbar(drawList); drawList();
}

function render(){
  renderNav();
  if(state.tab==='overview'){ document.getElementById('main').innerHTML=`<div class="readme">${DATA.readme_html}</div>`; return; }
  if(state.tab==='rubric_edits') return renderListTab('rubric_edits', rubricEditCard, true);
  if(state.tab==='rubric_deletes') return renderListTab('rubric_deletes', rubricDeleteCard, true);
  if(state.tab==='test_edits') return renderListTab('test_edits', r=>testCard(r,'edit_reason'), true);
  if(state.tab==='test_deletes') return renderListTab('test_deletes', r=>testCard(r,'deletion_reason'), true);
  if(state.tab==='test_files') return renderFiles();
}
renderHeader(); render();
</script>
</body>
</html>
