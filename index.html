ted 82 calendar events, found {len(events)}\"\n\n    normalized = {\n        (\n            (e.get(\"title\") or \"\").strip(),\n            str(e.get(\"start_datetime\") or \"\").strip(),\n            (e.get(\"location\") or \"\").strip(),\n            tuple(e.get(\"attendees\") or []),\n        )\n        for e in events\n    }\n\n    assert (\n        \"Dentist - Laura\",\n        \"2026-04-03T16:00:00Z\",\n        \"Kimball Family Dental, 4821 N. Kimball Ave\",\n        (),\n    ) in normalized, \"Missing Laura dentist anchor event\"\n\n    assert (\n        \"Volleyball\",\n        \"2026-04-04T15:00:00Z\",\n        \"Albany Park Community Center, 4745 N. Kedzie Ave\",\n        (),\n    ) in normalized, \"Missing volleyball anchor event\"\n\n    assert (\n        \"Dentist - Estrella\",\n        \"2026-04-08T21:00:00Z\",\n        \"Kimball Family Dental, 4821 N. Kimball Ave\",\n        (\"Estrella Chavez\",),\n    ) in normalized, \"Missing Estrella dentist anchor event\"\n\n\ndef test_snapshot_email_records_unchanged():\n    \"\"\"EV-016: email snapshot retains the expected count and anchor subjects.\"\"\"\n    data = _load_snapshot_json()\n    email = data.get(\"email\", {})\n    emails = email.get(\"emails\", [])\n    assert len(emails) == 188, f\"Expected 188 emails, found {len(emails)}\"\n    subjects = {(e.get(\"subject\") or \"\").strip() for e in emails}\n    assert \"Order Confirmed: Peso Pluma at United Center on Apr 5\" in subjects, \"Missing order confirmation subject\"\n    assert \"Reminder: Peso Pluma this Sunday at United Center\" in subjects, \"Missing reminder subject\"\n    assert \"Tonight: Peso Pluma at United Center\" in subjects, \"Missing event-night subject\"\n\n\ndef test_snapshot_contact_records_unchanged():\n    \"\"\"EV-017: contacts snapshot retains the expected count and anchor identity details.\"\"\"\n    data = _load_snapshot_json()\n    contacts = data.get(\"contacts\", {})\n    rows = contacts.get(\"contacts\", [])\n    assert len(rows) == 17, f\"Expected 17 contacts, found {len(rows)}\"\n    matched = [\n        c for c in rows\n        if f\"{c.get('first_name') or ''} {c.get('last_name') or ''}\".strip() == \"Laura Chavez\"\n    ]\n    assert matched, \"Missing Laura Chavez contact\"\n    laura = matched[0]\n    assert str(laura.get(\"email\") or \"\").strip() == \"laura.chavez.hha@gmail.com\", \"Laura email mismatch\"\n    assert str(laura.get(\"phone\") or \"\").strip() == \"(773) 555-0136\", \"Laura phone mismatch\"\n\n\ndef test_snapshot_reminder_records_unchanged():\n    \"\"\"EV-018: reminder snapshot retains the expected count and anchor titles.\"\"\"\n    data = _load_snapshot_json()\n    reminder = data.get(\"reminder\", {})\n    reminders = reminder.get(\"reminders\", [])\n    assert len(reminders) == 19, f\"Expected 19 reminders, found {len(reminders)}\"\n    titles = {(r.get(\"title\") or \"\").strip() for r in reminders}\n    assert \"Pick up prescription - CVS\" in titles, \"Missing CVS pickup reminder\"\n    assert \"After-school payment\" in titles, \"Missing after-school payment reminder\"\n    assert \"Car payment due\" in titles, \"Missing car payment reminder\"\n    assert \"Credit card payment\" in titles, \"Missing credit card reminder\"\n    assert \"Pay rent\" in titles, \"Missing rent reminder\"\n\n\ndef test_snapshot_messaging_records_unchanged():\n    \"\"\"EV-019: messaging snapshot retains the expected count and anchor conversation titles.\"\"\"\n    data = _load_snapshot_json()\n    messaging = data.get(\"messaging\", {})\n    conversations = messaging.get(\"conversations\", [])\n    assert len(conversations) == 29, f\"Expected 29 conversations, found {len(conversations)}\"\n    titles = {(c.get(\"title\") or \"\").strip() for c in conversations}\n    assert \"Familia Chavez\" in titles, \"Missing Familia Chavez conversation\"\n    assert \"Volta 6th Grade Parents\" in titles, \"Missing Volta 6th Grade Parents conversation\"\n    assert \"Estrella Chavez\" in titles, \"Missing Estrella Chavez conversation\"\n\n\nif __name__ == \"__main__\":\n    pytest.main([str(Path(__file__).resolve()), \"-rA\", \"--tb=short\"])\n", "6a2c83c0ee2598dd305a80ca.py": "#!/usr/bin/env python3\nimport sys\nimport subprocess\nimport importlib\nfrom pathlib import Path\n\n# --- pytest auto-install ---\ntry:\n    import pytest\nexcept ImportError:\n    print(\"pytest not found, installing...\")\n    subprocess.check_call([sys.executable, \"-m\", \"pip\", \"install\", \"pytest\"])\n    pytest = importlib.import_module(\"pytest\")\n\n# --- directory config ---\n# TASK_DIR: the task's input folder (prompt, snapshot, prompt_files, etc.)\n# On the platform the verifier runs as /home/user/workspace/verifier.py\nTASK_DIR = Path(__file__).resolve().parent\nPROJECT_ROOT = TASK_DIR.parent\nWORKSPACE_DIR = Path(__file__).parent / \"workspace\"\n\n\ndef _search_bases():\n    \"\"\"Where to look for agent output files.\"\"\"\n    return [\n        Path(__file__).parent / \"workspace\",       # /home/user/workspace/workspace\n        Path(__file__).parent,                      # /home/user/workspace  ← where agent writes\n        WORKSPACE_DIR,\n        TASK_DIR,\n    ]\n\n\ndef _find_snapshot():\n    \"\"\"Where to look for snapshots.json (written to ~ by the fetch script).\"\"\"\n    for path in (\n        Path.home() / \"snapshots.json\",            # ← fetch script writes here\n        Path(__file__).parent / \"snapshots.json\",\n        Path(__file__).parent / \"workspace\" / \"snapshots.json\",\n        TASK_DIR / \"snapshots.json\",\n        TASK_DIR / \"snapshot.json\",\n    ):\n        if path.is_file():\n            return path\n    return None\n\n\ndef _find_memory_md():\n    \"\"\"Find memory.md (case-insensitive stem).\"\"\"\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.md\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"memory\":\n                    return path.resolve()\n            except OSError:\n                continue\n    return None\n\n\n# --- tests go here ---\n\nimport json\n\n\nUNCHANGED_SERVICES = [\n    \"amazon-fresh\",\n    \"apple-health\",\n    \"calendar\",\n    \"messaging\",\n    \"notion\",\n    \"sonos\",\n    \"ticketmaster\",\n]\n\nEXPECTED_FINAL_REPLY = \"Data found and ready\"\n\n\ndef _load_json(path):\n    with open(path, \"r\", encoding=\"utf-8\") as f:\n        return json.load(f)\n\n\ndef _read_text(path):\n    return path.read_text(encoding=\"utf-8\", errors=\"ignore\")\n\n\ndef _short_json(value, max_len=1200):\n    text = json.dumps(value, sort_keys=True, ensure_ascii=False, indent=2)\n    if len(text) <= max_len:\n        return text\n    return text[:max_len] + \"\\n... <truncated>\"\n\n\ndef _load_snapshots():\n    snapshot_path = _find_snapshot()\n    assert snapshot_path is not None, \"snapshots.json was not found\"\n    return _load_json(snapshot_path)\n\n\ndef _load_initial_service_data(service_name):\n    data_path = PROJECT_ROOT / \"environment\" / \"server\" / \"data\" / service_name / \"data.json\"\n    if data_path.is_file():\n        return _load_json(data_path)\n    return None\n\n\ndef _extract_last_assistant_text(data):\n    candidates = []\n\n    def content_to_text(content):\n        if isinstance(content, str):\n            return content\n\n        if isinstance(content, list):\n            parts = []\n            for item in content:\n                if isinstance(item, str):\n                    parts.append(item)\n                elif isinstance(item, dict):\n                    if item.get(\"type\") == \"text\" and isinstance(item.get(\"text\"), str):\n                        parts.append(item[\"text\"])\n            return \"\\n\".join(parts).strip()\n\n        if isinstance(content, dict):\n            if isinstance(content.get(\"text\"), str):\n                return content[\"text\"]\n\n        return \"\"\n\n    def walk(value):\n        if isinstance(value, dict):\n            if value.get(\"role\") == \"assistant\":\n                text = content_to_text(value.get(\"content\"))\n                if text:\n                    candidates.append(text)\n\n            message = value.get(\"message\")\n            if isinstance(message, dict) and message.get(\"role\") == \"assistant\":\n                text = content_to_text(message.get(\"content\"))\n                if text:\n                    candidates.append(text)\n\n            for child in value.values():\n                walk(child)\n\n        elif isinstance(value, list):\n            for item in value:\n                walk(item)\n\n    walk(data)\n\n    if not candidates:\n        return None\n\n    return candidates[-1]\n\n\ndef _find_final_response_text():\n    text_file_names = {\n        \"final_response.txt\",\n        \"final-answer.txt\",\n        \"final_answer.txt\",\n        \"response.txt\",\n        \"assistant_response.txt\",\n        \"last_response.txt\",\n    }\n\n    json_file_names = {\n        \"trajectory.json\",\n        \"messages.json\",\n        \"conversation.json\",\n        \"transcript.json\",\n    }\n\n    for base in _search_bases():\n        if not base.exists():\n            continue\n\n        for path in base.rglob(\"*\"):\n            if not path.is_file():\n                continue\n\n            name = path.name.lower()\n\n            if name in text_file_names:\n                content = _read_text(path).strip()\n                if content:\n                    return content\n\n            if name in json_file_names:\n                try:\n                    data = _load_json(path)\n                except Exception:\n                    continue\n\n                response = _extract_last_assistant_text(data)\n                if response is not None:\n                    return response.strip()\n\n    conversation_search_dirs = []\n    parent_dir = Path(__file__).resolve().parent.parent\n    conversation_search_dirs.append(parent_dir)\n    for base in _search_bases():\n        conversation_search_dirs.append(base / \"conversation_history\")\n    conversation_search_dirs.append(parent_dir / \"conversation_history\")\n\n    for search_dir in conversation_search_dirs:\n        if not search_dir.exists():\n            continue\n        for path in sorted(search_dir.glob(\"*.json\")):\n            if not path.is_file():\n                continue\n            try:\n                data = _load_json(path)\n            except Exception:\n                continue\n            response = _extract_last_assistant_text(data)\n            if response is not None:\n                return response.strip()\n\n    return None\n\n\ndef test_final_response_is_exact_confirmation_phrase():\n    final_response = _find_final_response_text()\n\n    assert final_response is not None, (\n        \"Could not find a final-response artifact or trajectory artifact. \"\n        \"EV-001 cannot be verified unless the archive includes the assistant's final reply.\"\n    )\n\n    assert final_response.rstrip('.!').strip() == EXPECTED_FINAL_REPLY, (\n        f\"Expected final response to be exactly {EXPECTED_FINAL_REPLY!r}, \"\n        f\"but found {final_response!r}.\"\n    )\n\n\ndef test_required_services_are_present_in_comparable_snapshots():\n    snapshot_data = _load_snapshots()\n\n    assert isinstance(snapshot_data, dict), (\n        \"snapshots.json must be a JSON object (dict).\"\n    )\n\n    missing = [service for service in UNCHANGED_SERVICES if service not in snapshot_data]\n\n    assert not missing, (\n        \"snapshots.json is missing required service(s): \"\n        + \", \".join(missing)\n    )\n\n\n@pytest.mark.parametrize(\"service_name\", UNCHANGED_SERVICES)\ndef test_service_state_remains_unchanged(service_name):\n    initial_data = _load_initial_service_data(service_name)\n    assert initial_data is not None, (\n        f\"Could not load initial data for {service_name} from \"\n        f\"environment/server/data/{service_name}/data.json\"\n    )\n\n    snapshot_data = _load_snapshots()\n    assert service_name in snapshot_data, (\n        f\"snapshots.json missing service: {service_name}\"\n    )\n\n    after = snapshot_data[service_name]\n\n    assert after == initial_data, (\n        f\"The {service_name} service state changed.\\n\\n\"\n        f\"Initial:\\n{_short_json(initial_data)}\\n\\n\"\n        f\"After:\\n{_short_json(after)}\"\n    )\n\n\nif __name__ == \"__main__\":\n    pytest.main([str(Path(__file__).resolve()), \"-rA\", \"--tb=short\"])\n", "6a2c83c0ee2598dd305a80ec.py": "#!/usr/bin/env python3\nimport sys\nimport subprocess\nimport importlib\nfrom pathlib import Path\n\n# --- pytest auto-install ---\ntry:\n    import pytest\nexcept ImportError:\n    print(\"pytest not found, installing...\")\n    subprocess.check_call([sys.executable, \"-m\", \"pip\", \"install\", \"pytest\"])\n    pytest = importlib.import_module(\"pytest\")\n\n# --- directory config ---\nTASK_DIR = Path(__file__).resolve().parent\nPROJECT_ROOT = TASK_DIR.parent\nWORKSPACE_DIR = Path(__file__).parent / \"workspace\"\n\n\ndef _search_bases():\n    # Where to look for agent output files.\n    return [\n        Path(__file__).parent / \"workspace\",\n        Path(__file__).parent,\n        WORKSPACE_DIR,\n        TASK_DIR,\n        Path(__file__).parent.parent / \"conversation_history\",\n    ]\n\n\ndef _find_snapshot():\n    # Where to look for snapshots.json.\n    for path in (\n        Path.home() / \"snapshots.json\",\n        Path(__file__).parent / \"snapshots.json\",\n        Path(__file__).parent / \"workspace\" / \"snapshots.json\",\n        TASK_DIR / \"snapshots.json\",\n        TASK_DIR / \"snapshot.json\",\n    ):\n        if path.is_file():\n            return path\n    return None\n\n\ndef _find_memory_md():\n    # Find memory.md (case-insensitive stem).\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.md\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"memory\":\n                    return path.resolve()\n            except OSError:\n                continue\n    return None\n\n# --- tests go here ---\n\nimport os\nimport re\nimport json\n\n# ---------------------------------------------------------------------------\n# Artifact discovery + agent-answer extraction.\n#\n# This is a READ-ONLY analytical task: the agent mutates no service state, so the\n# service-state snapshot is identical for a correct and an incorrect run and\n# cannot distinguish them. The only artifact that reflects the analysis is the\n# agent's FINAL answer, persisted in the run artifact(s) inside the workspace.\n#\n# Discovery goes strictly through the skeleton's _search_bases() roots; a\n# trajectory*.json or a persisted answer .md/.txt qualifies as the artifact.\n# Optional OPENCLAW_AGENT_FILE / OPENCLAW_AGENT_DIR env vars let you point the\n# suite at a specific run (e.g. the Model A response) without code changes.\n# ---------------------------------------------------------------------------\n\n_ANSWER_KEYWORDS = (\"answer\", \"response\", \"summary\", \"finance\", \"report\")\n\n\ndef _candidate_artifacts():\n    \"\"\"Response-bearing artifacts under the skeleton _search_bases() roots, newest\n    first. Accepts trajectory*.json files, conversation history JSON files, and\n    persisted answer .md/.txt files.\"\"\"\n    found = {}\n    for base in _search_bases():\n        try:\n            if not base.exists():\n                continue\n        except OSError:\n            continue\n        for path in base.rglob(\"*\"):\n            try:\n                if not path.is_file():\n                    continue\n            except OSError:\n                continue\n            name = path.name.lower()\n            is_traj = name.startswith(\"trajectory\") and name.endswith(\".json\")\n            is_conv_history = (\n                name.endswith(\".json\")\n                and \"conversation_history\" in str(path.parent).lower()\n            )\n            is_answer = path.suffix.lower() in (\".md\", \".txt\") and any(\n                k in name for k in _ANSWER_KEYWORDS\n            )\n            if is_traj or is_conv_history or is_answer:\n                found[path.resolve()] = path\n    return sorted(found.values(), key=lambda p: p.stat().st_mtime, reverse=True)\n\n\ndef _final_assistant_text(traj_path):\n    \"\"\"Text of the LAST non-empty assistant message in a trajectory file.\"\"\"\n    with open(traj_path, \"r\", encoding=\"utf-8\") as fh:\n        data = json.load(fh)\n    arr = data if isinstance(data, list) else data.get(\"trajectory\", [])\n    text = \"\"\n    for elem in arr:\n        if not isinstance(elem, dict):\n            continue\n        # session-log format -> {\"type\": \"message\", \"message\": {...}}\n        # role-list format   -> {\"role\": ..., \"content\": ...}\n        msg = elem.get(\"message\", elem)\n        if not isinstance(msg, dict) or msg.get(\"role\") != \"assistant\":\n            continue\n        content = msg.get(\"content\")\n        if isinstance(content, list):\n            chunk = \"\".join(\n                p.get(\"text\", \"\")\n                for p in content\n                if isinstance(p, dict) and p.get(\"type\") == \"text\"\n            )\n        elif isinstance(content, str):\n            chunk = content\n        else:\n            chunk = \"\"\n        if chunk.strip():\n            text = chunk  # keep the LAST non-empty assistant message (final answer)\n    return text\n\n\ndef _artifact_text(path):\n    path = Path(path)\n    if path.suffix.lower() == \".json\":\n        try:\n            return _final_assistant_text(path)\n        except (ValueError, OSError):\n            return \"\"\n    try:\n        return path.read_text(encoding=\"utf-8\", errors=\"ignore\")\n    except OSError:\n        return \"\"\n\n\ndef _load_agent_text():\n    # optional explicit overrides\n    f = os.environ.get(\"OPENCLAW_AGENT_FILE\")\n    if f and os.path.isfile(f):\n        return _artifact_text(f)\n    d = os.environ.get(\"OPENCLAW_AGENT_DIR\")\n    if d and os.path.isdir(d):\n        cands = sorted(Path(d).rglob(\"trajectory*.json\"),\n                       key=lambda p: p.stat().st_mtime, reverse=True)\n        if cands:\n            return _final_assistant_text(cands[0])\n    # default: discover via the skeleton _search_bases() roots\n    for path in _candidate_artifacts():\n        txt = _artifact_text(path)\n        if txt and txt.strip():\n            return txt\n    return None\n\n\ndef _amounts(text):\n    \"\"\"All numeric/dollar tokens in the text as a set of rounded floats.\"\"\"\n    vals = set()\n    for tok in re.findall(r'\\$?\\s?(\\d{1,3}(?:,\\d{3})*(?:\\.\\d+)?|\\d+(?:\\.\\d+)?)', text or \"\"):\n        try:\n            vals.add(round(float(tok.replace(\",\", \"\")), 2))\n        except ValueError:\n            pass\n    return vals\n\n\ndef _has(text, value, tol=0.01):\n    \"\"\"True if `value` appears as a number in `text` ($ / commas tolerated).\"\"\"\n    return any(abs(a - value) <= tol for a in _amounts(text))\n\n\n# Load the agent's final answer once.\nRESPONSE = _load_agent_text()\n\n\ndef _require_response():\n    assert RESPONSE is not None and RESPONSE.strip(), (\n        \"No agent answer artifact found under the _search_bases() roots.\"\n    )\n\n\n# ---------------------------------------------------------------------------\n# EV-001 -- a non-snapshot answer artifact exists\n# ---------------------------------------------------------------------------\n\ndef test_response_present():\n    \"\"\"A non-snapshot answer artifact exists in the workspace and is non-empty.\"\"\"\n    assert len(_candidate_artifacts()) > 0, \\\n        \"No non-snapshot answer artifact found under the workspace roots\"\n    _require_response()\n\n\n# ---------------------------------------------------------------------------\n# (a) Side income + 20% house-fund transfer\n# ---------------------------------------------------------------------------\n\ndef test_side_income_q1_total_and_average():\n    \"\"\"Q1 side income = $871.35; monthly average = $290.45.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 871.35), \"Q1 side-income total $871.35 not reported\"\n    assert _has(RESPONSE, 290.45), \"Monthly side-income average $290.45 not reported\"\n\n\ndef test_side_income_monthly_components():\n    \"\"\"Monthly side income: January = $625 ($275 Marco + $350 Keisha); February =\n    $127.43; March = $118.92 (AdSense / YouTube).\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 625.00) or (_has(RESPONSE, 275.00) and _has(RESPONSE, 350.00)), \\\n        \"January side income ($625, or its $275 + $350 components) not reported\"\n    assert _has(RESPONSE, 127.43), \"February AdSense $127.43 missing\"\n    assert _has(RESPONSE, 118.92), \"March AdSense $118.92 missing\"\n\n\ndef test_house_fund_transfer_and_residual():\n    \"\"\"20% of $290.45 = $58.09 transfer; $232.36 residual.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 58.09, tol=1.0), \"20% house-fund transfer ~$58.09 not reported\"\n    assert _has(RESPONSE, 232.36, tol=1.0), \"Monthly residual ~$232.36 not reported\"\n\n\n# ---------------------------------------------------------------------------\n# (b) Loan principal -- from stated balances (DISTINGUISHES vs Model A)\n# ---------------------------------------------------------------------------\n\ndef test_sentra_principal_from_statements():\n    \"\"\"EV-009: each $285 payment fully reduces the stated Nissan balance -> $855 over\n    Q1. Model A invents an amortization split and never reports $855 -> FAILS on\n    Model A.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 855.0), \"Nissan Q1 principal reduction $855 not reported\"\n\n\ndef test_student_loan_principal_from_statements():\n    \"\"\"EV-010: each $245 payment fully reduces the stated FedLoan balance -> $735 over\n    Q1. Model A reports a fabricated ~$515 and never $735 -> FAILS on Model A.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 735.0), \"FedLoan Q1 principal reduction $735 not reported\"\n\n\n# ---------------------------------------------------------------------------\n# (c) Credit-card trend -- statement-grounded (DISTINGUISHES vs Model A)\n#\n# Grounded in the official Capital One statement \"New Balance\" figures, as the\n# prompt mandates (\"go off what's really in my accounts and statements, not the\n# labels\"). New Balance falls $4,215.00 -> $4,092.17 = -$122.83 over Q1. The\n# fintrack 6547 transaction feed does NOT reconcile with the statements (it is the\n# disorganized \"labels\" the prompt says to disregard), so a transaction-sum\n# reading is not authoritative here.\n# ---------------------------------------------------------------------------\n\ndef test_credit_card_declining_by_122_83():\n    \"\"\"Statement New Balance declines $122.83 over Q1; Model A never surfaces this\n    figure -> FAILS on Model A.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 122.83), \"Q1 credit-card decline of $122.83 not reported\"\n\n\ndef test_credit_card_statement_balances_used():\n    \"\"\"The conclusion must be grounded in the statement New Balances, not invented\n    charge figures. Model A never reads the statements, so $4,092.17 is absent ->\n    FAILS on Model A.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 4215.00), \"January statement New Balance $4,215.00 missing\"\n    assert _has(RESPONSE, 4092.17), \"March statement New Balance $4,092.17 missing\"\n\n\n# ---------------------------------------------------------------------------\n# (d) Alton property-tax reconciliation\n# ---------------------------------------------------------------------------\n\ndef test_property_tax_short_by_12_18():\n    \"\"\"EV-013: 2026 annual tax $2,412.18 vs $200x12 = $2,400 annualized -> short\n    $12.18/year.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 2412.18), \"2026 annual property tax $2,412.18 missing\"\n    assert _has(RESPONSE, 2400.00), \"Annualized $2,400 paid amount not stated\"\n    assert _has(RESPONSE, 12.18), \"Annual shortfall of $12.18 not reported\"\n\n\n# ---------------------------------------------------------------------------\n# (e) Monthly picture -- take-home, averaged variable bills, separate billers\n# ---------------------------------------------------------------------------\n\ndef test_take_home_income():\n    \"\"\"$4,900 combined monthly take-home is the baseline for the monthly picture.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 4900.00), \"$4,900 monthly take-home not referenced\"\n\n\ndef test_electric_averaged_over_quarter():\n    \"\"\"Ameren electric/gas averaged across Q1 = $167.60 ($189.14/$172.37/$141.28).\n    Model A uses a flat merged $155 utility line and never computes $167.60 -> FAILS\n    on Model A.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 167.60), \"Ameren Q1 average $167.60 not reported\"\n\n\ndef test_water_billed_separately():\n    \"\"\"Water (Missouri American Water) must be a distinct biller, not merged into the\n    electric/gas line. Model A merges them -> FAILS on Model A.\"\"\"\n    _require_response()\n    low = RESPONSE.lower()\n    assert (\"missouri american water\" in low) or (\"water\" in low and _has(RESPONSE, 26.18)), \\\n        \"Water not reported as a separate biller\"\n\n\ndef test_fuel_averaged_from_actuals():\n    \"\"\"Gas/fuel averaged from actual Q1 fill-ups = $139.82.\"\"\"\n    _require_response()\n    assert _has(RESPONSE, 139.82), \"Q1 fuel average $139.82 not reported\"\n\n\nif __name__ == \"__main__\":\n    pytest.main([str(Path(__file__).resolve()), \"-rA\", \"--tb=short\"])\n", "6a2c83c0ee2598dd305a8105.py": "#!/usr/bin/env python3\nimport sys\nimport subprocess\nimport importli unt == 8:\n                found_eight = True\n        except Exception as exc:\n            report_lines.append(str(path) + \" -> error: \" + str(exc))\n\n    assert found_eight, (\n        \"No .pptx deck has exactly 8 slides. Candidates examined: \"\n        + \"; \".join(report_lines)\n    )\n\n\nif __name__ == \"__main__\":\n    pytest.main([str(Path(__file__).resolve()), \"-rA\", \"--tb=short\"])", "6a2c83c0ee2598dd305a814b.py": "#!/usr/bin/env python3\nimport sys\nimport subprocess\nimport importlib\nfrom pathlib import Path\n\n# --- pytest auto-install ---\ntry:\n    import pytest\nexcept ImportError:\n    print(\"pytest not found, installing...\")\n    subprocess.check_call([sys.executable, \"-m\", \"pip\", \"install\", \"pytest\"])\n    pytest = importlib.import_module(\"pytest\")\n\n# --- directory config ---\nTASK_DIR = Path(__file__).resolve().parent\nPROJECT_ROOT = TASK_DIR.parent\nWORKSPACE_DIR = Path(__file__).parent / \"workspace\"\n\n\ndef _search_bases():\n    # Where to look for agent output files.\n    return [\n        Path(__file__).parent / \"workspace\",\n        Path(__file__).parent,\n        WORKSPACE_DIR,\n        TASK_DIR,\n    ]\n\n\ndef _find_snapshot():\n    # Where to look for snapshots.json.\n    for path in (\n        Path.home() / \"snapshots.json\",\n        Path(__file__).parent / \"snapshots.json\",\n        Path(__file__).parent / \"workspace\" / \"snapshots.json\",\n        TASK_DIR / \"snapshots.json\",\n        TASK_DIR / \"snapshot.json\",\n    ):\n        if path.is_file():\n            return path\n    return None\n\n\ndef _find_memory_md():\n    # Find memory.md (case-insensitive stem).\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.md\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"memory\":\n                    return path.resolve()\n            except OSError:\n                continue\n    return None\n\n# --- tests go here ---\n\nimport json\nimport re\n\n\nEXPECTED_ACCOUNT_IDS = {\"4271\", \"8903\", \"6184\", \"5547\"}\n\n\ndef _find_excel_file():\n    \"\"\"Find the Excel workbook created by the agent.\"\"\"\n    candidates = []\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for pattern in (\"*.xlsx\", \"*.xls\"):\n            for path in base.rglob(pattern):\n                try:\n                    if path.is_file() and not path.name.startswith(\"~$\"):\n                        candidates.append(path.resolve())\n                except OSError:\n                    continue\n\n    if not candidates:\n        return None\n\n    return max(candidates, key=lambda p: p.stat().st_mtime)\n\n\ndef _load_workbook():\n    \"\"\"Open the agent-created workbook and return an openpyxl workbook.\"\"\"\n    excel_file = _find_excel_file()\n    if excel_file is None:\n        pytest.fail(\"No Excel file (.xlsx or .xls) found in workspace\")\n\n    try:\n        import openpyxl\n    except ImportError:\n        subprocess.check_call([sys.executable, \"-m\", \"pip\", \"install\", \"openpyxl\"])\n        import openpyxl\n\n    try:\n        return openpyxl.load_workbook(excel_file, data_only=True)\n    except Exception as exc:\n        pytest.fail(f\"Failed to open Excel file {excel_file.name}: {exc}\")\n\n\ndef _cell_text(value):\n    if value is None:\n        return \"\"\n    return str(value).strip().lower()\n\n\ndef _workbook_text(workbook):\n    \"\"\"Return all sheet names and cell values as one lowercase text blob.\"\"\"\n    chunks = []\n    for sheet_name in workbook.sheetnames:\n        chunks.append(str(sheet_name).lower())\n        sheet = workbook[sheet_name]\n        for row in sheet.iter_rows():\n            for cell in row:\n                text = _cell_text(cell.value)\n                if text:\n                    chunks.append(text)\n    return \" \".join(chunks)\n\n\ndef _sheet_rows_as_text(workbook, sheet_name=None):\n    \"\"\"Return lowercase row texts from the whole workbook or one sheet.\"\"\"\n    rows = []\n    sheet_names = [sheet_name] if sheet_name else workbook.sheetnames\n    for name in sheet_names:\n        sheet = workbook[name]\n        for row in sheet.iter_rows():\n            row_text = \" \".join(_cell_text(cell.value) for cell in row if cell.value is not None)\n            row_text = row_text.strip()\n            if row_text:\n                rows.append(row_text)\n    return rows\n\n\ndef _sheet_matching(workbook, *required_name_terms):\n    \"\"\"Find a worksheet whose name contains all required terms.\"\"\"\n    wanted = [term.lower() for term in required_name_terms]\n    for sheet_name in workbook.sheetnames:\n        lowered = sheet_name.lower()\n        if all(term in lowered for term in wanted):\n            return sheet_name\n    return None\n\n\ndef _table_rows(sheet):\n    \"\"\"Return table rows as lists of lowercase cell strings.\"\"\"\n    rows = []\n    for row in sheet.iter_rows():\n        values = [_cell_text(cell.value) for cell in row]\n        if any(values):\n            rows.append(values)\n    return rows\n\n\ndef _find_header_and_records(sheet, required_header_terms):\n    \"\"\"Find a header row and return (header, records) after it.\"\"\"\n    rows = _table_rows(sheet)\n    for idx, row in enumerate(rows):\n        row_text = \" \".join(row)\n        if all(term in row_text for term in required_header_terms):\n            return row, rows[idx + 1:]\n    pytest.fail(\n        f\"Could not find header with required terms {required_header_terms} \"\n        f\"in sheet {sheet.title!r}\"\n    )\n\n\ndef _column_index(header, accepted_names):\n    \"\"\"Find a column index using fuzzy header text.\"\"\"\n    for idx, value in enumerate(header):\n        if any(name in value for name in accepted_names):\n            return idx\n    return None\n\n\ndef _row_text(row):\n    return \" \".join(value for value in row if value)\n\n\ndef _has_any(text, terms):\n    return any(term in text for term in terms)\n\n\ndef _fintrack_last_four_values():\n    \"\"\"Get the exact FinTrack account identifiers from snapshots.json.\"\"\"\n    snapshot_path = _find_snapshot()\n    assert snapshot_path is not None, \"snapshots.json not found; cannot verify FinTrack account roster.\"\n\n    try:\n        with open(snapshot_path, \"r\") as fh:\n            snapshots = json.load(fh)\n    except Exception as exc:\n        pytest.fail(f\"Could not read snapshots.json: {exc}\")\n\n    accounts = snapshots.get(\"fintrack\", {}).get(\"accounts\")\n    assert isinstance(accounts, list), \"snapshots.json is missing fintrack.accounts.\"\n\n    values = set()\n    for account in accounts:\n        for key in (\"last_four\", \"last4\", \"last_4\", \"account_last_four\"):\n            value = account.get(key)\n            if value:\n                values.add(str(value))\n                break\n        else:\n            account_text = \" \".join(str(v) for v in account.values() if v is not None)\n            values.update(re.findall(r\"\\b\\d{4}\\b\", account_text))\n\n    assert values, \"No last-four account identifiers found in fintrack.accounts.\"\n    return values\n\n\ndef test_excel_file_exists_and_opens():\n    \"\"\"Verify that a non-empty, openable Excel workbook was created.\"\"\"\n    excel_file = _find_excel_file()\n    assert excel_file is not None, (\n        \"No Excel file (.xlsx or .xls) found in workspace. \"\n        \"The task requires saving an Excel workbook.\"\n    )\n    assert excel_file.stat().st_size > 0, f\"Excel file {excel_file.name} exists but is empty\"\n\n    workbook = _load_workbook()\n    assert workbook.sheetnames, \"Excel workbook opens but has no sheets\"\n\n\ndef test_account_overview_matches_exact_fintrack_accounts():\n    \"\"\"Verify Account Overview contains exactly Laura's four FinTrack account rows.\"\"\"\n    workbook = _load_workbook()\n    overview_name = _sheet_matching(work ow(row)\n        and \"total\" in _normalize(_first_cell(row))\n    ]\n\n\ndef test_memory_file_exists():\n    \"\"\"MEMORY.md must exist in the final workspace state.\"\"\"\n    memory_path = _find_memory_md()\n\n    assert memory_path is not None, (\n        \"MEMORY.md was not found in the workspace or task directory.\"\n    )\n\n    assert memory_path.is_file(), (\n        f\"The located MEMORY.md path is not a file: {memory_path}\"\n    )\n\n\ndef test_memory_contains_structured_subscription_breakdown():\n    \"\"\"MEMORY.md must contain all five subscriptions with exact amounts.\"\"\"\n    memory_path = _find_memory_md()\n    assert memory_path is not None, \"MEMORY.md was not found.\"\n\n    content = memory_path.read_text(encoding=\"utf-8\")\n    table = _find_subscription_table(content)\n\n    for service_name, expected in EXPECTED_SUBSCRIPTIONS.items():\n        row = _find_row_by_tokens(\n            table,\n            expected[\"tokens\"],\n        )\n        row_text = \" | \".join(row)\n        amounts = _extract_money_values(row_text)\n\n        assert expected[\"amount\"] in amounts, (\n            f\"{service_name} must be recorded as \"\n            f\"${expected['amount']:.2f}. Found row: {row_text}\"\n        )\n\n\ndef test_spotify_uses_current_family_plan_amount():\n    \"\"\"Spotify must use the current Family-plan amount of $16.99.\"\"\"\n    memory_path = _find_memory_md()\n    assert memory_path is not None, \"MEMORY.md was not found.\"\n\n    content = memory_path.read_text(encoding=\"utf-8\")\n    table = _find_subscription_table(content)\n\n    spotify_rows = [\n        row\n        for row in table\n        if not _is_separator_row(row)\n        and \"spotify\" in _normalize(_first_cell(row))\n    ]\n\n    assert spotify_rows, (\n        \"No Spotify row was found in the subscription table.\"\n    )\n\n    for row in spotify_rows:\n        row_text = \" | \".join(row)\n        amounts = _extract_money_values(row_text)\n\n        assert t():\n    path = _find_medical_debt_md()\n    assert path is not None, \"medical_debt.md was not produced by the agent\"\n    return path.read_text(encoding=\"utf-8\")\n\n\n@pytest.fixture(scope=\"session\")\ndef memory_text():\n    path = _find_memory_md()\n    assert path is not None, \"MEMORY.md not found\"\n    return path.read_text(encoding=\"utf-8\")\n\n\n# ---------- helpers ----------\ndef _amounts(text):\n    \"\"\"Return set of integer dollar amounts found, normalizing $2,850 / $2850 / 2850.\"\"\"\n    found = set()\n    for m in re.findall(r\"\\$?\\s*([0-9][0-9,]*)(?:\\.\\d{1,2})?\", text):\n        digits = m.replace(\",\", \"\")\n        if digits.isdigit():\n            found.add(int(digits))\n    return found\n\n\n# ============================================================\n# TASK COMPLETION — final artifact correctness\n# ============================================================\ndef test_medical_debt_file_reports_2850(medical_debt_text):\n    \"\"\"medical_debt.md must report the true remaining balance of $2,850.\"\"\"\n    amounts = _amounts(medical_debt_text)\n    assert 2850 in amounts, (\n        f\"medical_debt.md must contain the correct remaining balance 2850. \"\n        f\"Found amounts: {sorted(amounts)}\"\n    )\n\n\ndef test_medical_debt_file_not_stale_3600_as_current(medical_debt_text):\n    \"\"\"$3,600 must not be presented as the current/remaining/owed balance.\n\n    $3,600 is the original balance on file, so it may legitimately appear when\n    labeled as the original/starting figure. The failure mode this guards\n    against is reporting $3,600 as the amount still owed (the answer Olivia\n    asked for).\"\"\"\n    for raw_line in medical_debt_text.splitlines():\n        line = raw_line.lower()\n        mentions_3600 = \"3,600\" in line or \"3600\" in line\n        if not mentions_3600:\n            continue\n        labeled_original = any(\n            w in line for w in (\"original\", \"starting\", \"initial\", \"on file\", \"was \", \"previous\", \"prior\", \"former\", \"old \", \"last \", \"past \", \"earlier\", \"before\")\n        )\n        framed_as_current = any(\n            w in line for w in (\"remaining\", \"owe\", \"still\", \"current\", \"balance:\")\n        )\n        if framed_as_current and not labeled_original:\n            assert False, (\n                f\"medical_debt.md frames $3,600 as the current balance: {raw_line!r}\"\n            )\n\n\n# ============================================================\n# STATE CHANGE — MEMORY.md updated to the correct figure\n# ============================================================\ndef test_memory_updated_to_2850(memory_text):\n    \"\"\"MEMORY.md must reflect the corrected $2,850 balance, not the stale $3,600.\"\"\"\n    amounts = _amounts(memory_text)\n    assert 2850 in amounts, \"MEMORY.md was not updated to the correct 2850 balance\"\n\n\n# ============================================================\n# FACTUALITY / GROUND TRUTH — derive answer from live snapshot\n# ============================================================\ndef _providence_txns(state):\n    txns = state[\"fintrack\"][\"transactions\"]\n    return [\n        t for t in txns\n        if \"providence\" in str(t.get(\"merchant\", \"\")).lower()\n        and float(t.get(\"amount\", 0)) < 0\n    ]\n\n\ndef test_snapshot_has_six_providence_payments(state):\n    \"\"\"Fintrack final state must contain the 6 Providence $150 payments.\"\"\"\n    prov = _providence_txns(state)\n    assert len(prov) == 6, f\"Expected 6 Providence payments, found {len(prov)}\"\n    assert all(abs(float(t[\"amount\"])) == 150.0 for t in prov)\n\n\ndef test_snapshot_has_may15_payment(state):\n    \"\"\"The May 15, 2026 payment (latest, post-$3,000 statement) must exist.\"\"\"\n    prov = _providence_txns(state)\n    dates = {str(t.get(\"date\")) for t in prov}\n    assert \"2026-05-15\" in dates, f\"May 15 payment missing. Dates: {sorted(dates)}\"\n\n\ndef test_last_emailed_balance_is_3000(state):\n    \"\"\"The most recent Providence balance email reports $3,000 remaining.\"\"\"\n    emails = state[\"email\"][\"emails\"]\n    pay = [\n        e for e in emails\n        if \"Payment Received\" in (e.get(\"subject\") or \"\")\n        and \"8834\" in (e.get(\"subject\") or \"\")\n    ]\n    assert len(pay) >= 4, f\"Expected >=4 payment emails, found {len(pay)}\"\n    pay.sort(key=lambda e: e.get(\"timestamp\") or \"\")\n    latest = pay[-1].get(\"content\", \"\")\n    assert \"3,000\" in latest or \"3000\" in latest, (\n        \"Latest Providence email should report a $3,000 remaining balance\"\n    )\n\n\ndef test_ground_truth_balance_equals_2850(state):\n    \"\"\"Derived ground truth: last emailed balance ($3,000) minus the single\n    confirmed payment after it ($150 on May 15) = $2,850.\"\"\"\n    last_emailed_balance = 3000\n    prov = _providence_txns(state)\n    after_may = [t for t in prov if str(t.get(\"date\")) >= \"2026-05-01\"]\n    derived = last_emailed_balance - 150 * len(after_may)\n    assert derived == 2850, f\"Derived balance {derived} != 2850\"\n", "6a2c83c0ee2598dd305a8187.py": "#!/usr/bin/env python3\nimport sys\nimport subprocess\nimport importlib\nfrom pathlib import Path\n\n# --- pytest auto-install ---\ntry:\n    import pytest\nexcept ImportError:\n    print(\"pytest not found, installing...\")\n    subprocess.check_call([sys.executable, \"-m\", \"pip\", \"install\", \"pytest\"])\n    pytest = importlib.import_module(\"pytest\")\n\n# --- directory config ---\nTASK_DIR = Path(__file__).resolve().parent\nPROJECT_ROOT = TASK_DIR.parent\nWORKSPACE_DIR = Path(__file__).parent / \"workspace\"\n\n\ndef _search_bases():\n    return [\n        Path(__file__).parent / \"workspace\",\n        Path(__file__).parent,\n        WORKSPACE_DIR,\n        TASK_DIR,\n    ]\n\n\ndef _find_snapshot():\n    for path in (\n        Path.home() / \"snapshots.json\",\n        Path(__file__).parent / \"snapshots.json\",\n        Path(__file__).parent / \"workspace\" / \"snapshots.json\",\n        TASK_DIR / \"snapshots.json\",\n        TASK_DIR / \"snapshot.json\",\n    ):\n        if path.is_file():\n            return path\n    return None\n\n\ndef _find_memory_md():\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.md\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"memory\":\n                    return path.resolve()\n            except OSError:\n                continue\n    return None\n\n# --- tests go here ---\n\nimport json\nimport re\n\n\ndef test_memory_md_exists():\n    \"\"\"Check that MEMORY.md file was created\"\"\"\n    memory_path = _find_memory_md()\n    assert memory_path is not None, \"MEMORY.md file was not created\"\n    assert memory_path.exists(), f\"MEMORY.md file does not exist at {memory_path}\"\n\n\ndef test_memory_contains_expense_tracker_data():\n    \"\"\"Check that MEMORY.md contains expense tracker summary data (not just pre-existing content)\"\"\"\n    memory_path = _find_memory_md()\n    if memory_path is None:\n        pytest.fail(\"MEMORY.md file not found\")\n    content = memory_path.read_text().lower()\n    specific_phrases = [\"total monthly expenses\", \"net surplus\", \"monthly income\"]\n    matches = sum(1 for phrase in specific_phrases if phrase in content)\n    assert matches >= 2, (\n        \"MEMORY.md does not contain sufficient expense tracker summary data. \"\n        f\"Expected at least 2 of {specific_phrases} but found {matches}\"\n    )\n\n\ndef test_memory_contains_income_data():\n    \"\"\"Check that MEMORY.md contains income information\"\"\"\n    memory_path = _find_memory_md()\n    if memory_path is None:\n        pytest.fail(\"MEMORY.md file not found\")\n    content = memory_path.read_text()\n    assert any(amt in content for amt in [\"7200\", \"7,200\"]), \\\n        \"MEMORY.md does not contain monthly income of $7,200\"\n\n\ndef test_memory_contains_hobbies_hosting_value():\n    \"\"\"Check that MEMORY.md contains the Hobbies & hosting expense value\"\"\"\n    memory_path = _find_memory_md()\n    if memory_path is None:\n        pytest.fail(\"MEMORY.md file not found\")\n    content = memory_path.read_text()\n    assert any(v in content for v in ['198', '204']), \\\n        'MEMORY.md does not contain Hobbies & hosting value ($198 without dental or $204 with dental mapped)'\n\n\ndef test_memory_contains_rent_amount():\n    \"\"\"Check that rent amount is documented in MEMORY.md\"\"\"\n    memory_path = _find_memory_md()\n    if memory_path is None:\n        pytest.fail(\"MEMORY.md file not found\")\n    content = memory_path.read_text()\n    assert any(amt in content for amt in [\"1375\", \"1,375\"]), \\\n        \"MEMORY.md does not contain rent amount ($1,375)\"\n\n\ndef test_memory_mentions_data_sources():\n    \"\"\"Check that MEMORY.md mentions Fintrack as the data source\"\"\"\n    memory_path = _find_memory_md()\n    if memory_path is None:\n        pytest.fail(\"MEMORY.md file not found\")\n    content = memory_path.read_text().lower()\n    assert \"fintrack\" in content, \"MEMORY.md does not mention Fintrack as data source\"\n\n\ndef test_heartbeat_created_for_sister_message():\n    \"\"\"Check that a heartbeat was created to monitor sister Brynn's messages\"\"\"\n    heartbeat_path = None\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.md\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"heartbeat\":\n                    heartbeat_path = path.resolve()\n                    break\n            except OSError:\n                continue\n        if heartbeat_path:\n            break\n    assert heartbeat_path is not None, \"HEARTBEAT.md file not found\"\n    content = heartbeat_path.read_text().lower()\n    assert any(term in content for term in [\"brynn\", \"sister\"]), \\\n \"-rA\", \"--tb=short\"])\n", "6a2e4c53cae99f56e3e572cf.py": "#!/usr/bin/env python3\nimport sys\nimport subprocess\nimport importlib\nfrom pathlib import Path\n\n# --- pytest auto-install ---\ntry:\n    import pytest\nexcept ImportError:\n    print(\"pytest not found, installing...\")\n    subprocess.check_call([sys.executable, \"-m\", \"pip\", \"install\", \"pytest\"])\n    pytest = importlib.import_module(\"pytest\")\n\n# --- directory config ---\nTASK_DIR = Path(__file__).resolve().parent\nPROJECT_ROOT = TASK_DIR.parent\nWORKSPACE_DIR = Path(__file__).parent / \"workspace\"\n\n\ndef _search_bases():\n    return [\n        Path(__file__).parent / \"workspace\",\n        Path(__file__).parent,\n        WORKSPACE_DIR,\n        TASK_DIR,\n    ]\n\n\ndef _find_snapshot():\n    for path in (\n        Path.home() / \"snapshots.json\",\n        Path(__file__).parent / \"snapshots.json\",\n        Path(__file__).parent / \"workspace\" / \"snapshots.json\",\n        TASK_DIR / \"snapshots.json\",\n        TASK_DIR / \"snapshot.json\",\n    ):\n        if path.is_file():\n            return path\n    return None\n\n\ndef _find_memory_md():\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.md\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"memory\":\n                    return path.resolve()\n            except OSError:\n                continue\n    return None\n\n\n# --- tests go here ---\n\nimport csv\nimport re\n\nCSV_NAME = \"infra_cost.csv\"\n\n\ndef _find_file(name_lower):\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*\"):\n            try:\n                if path.is_file() and path.name.lower() == name_lower:\n                    return path\n            except OSError:\n                continue\n    return None\n\n\ndef _load_csv():\n    path = _find_file(CSV_NAME.lower())\n    if path is None:\n        return None\n    with open(path, newline=\"\", encoding=\"utf-8\") as f:\n        return list(csv.DictReader(f))\n\n\ndef _amounts(rows):\n    return [float(r[\"Amount\"]) for r in rows]\n\n\ndef _dates(rows):\n    return [r[\"Date\"] for r in rows]\n\n\n# ==========================================================\n# T-01: CSV file exists\n# ==========================================================\ndef test_csv_exists():\n    path = _find_file(CSV_NAME.lower())\n    assert path is not None, \"csv not found\"\n\n\n# ==========================================================\n# T-02: CSV has correct header columns\n# ==========================================================\ndef test_csv_header():\n    path = _find_file(CSV_NAME.lower())\n    assert path is not None, \"csv not found\"\n    with open(path, encoding=\"utf-8\") as f:\n        reader = csv.reader(f)\n        header = next(reader)\n    assert header == [\"Date\", \"Amount\", \"Account\"], f\"header {header}\"\n\n\n# ==========================================================\n# T-03: CSV has 13 data rows (6 AWS + 6 GitHub + 1 Namecheap)\n#       or 7 rows (6 GitHub + 1 Namecheap) if AWS excluded\n# ==========================================================\ndef test_csv_row_count():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    assert len(rows) in (7, 13), f\"row count {len(rows)} not 7 or 13\"\n\n\n# ==========================================================\n# T-04: CSV total equals $587.37\n# ==========================================================\ndef test_csv_total():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    total = sum(_amounts(rows))\n    assert abs(total - 587.37) < 0.01, f\"total {total} not 587.37\"\n\n\n# ==========================================================\n# T-05: CSV contains Nov 2025 AWS charge ($85.23)\n# ==========================================================\ndef test_csv_has_amount_85_23():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    amounts = _amounts(rows)\n    assert 85.23 in amounts, \"85.23 not in csv\"\n\n\n# ==========================================================\n# T-06: CSV contains Apr 2026 AWS charge ($91.03) or\n#       consistently excludes all AWS charges\n# ==========================================================\ndef test_csv_has_amount_91_03():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    amounts = _amounts(rows)\n    aws_amounts = [85.23, 87.41, 86.18, 85.90, 88.74, 91.03]\n    has_91_03 = 91.03 in amounts\n    all_aws_excluded = all(a not in amounts for a in aws_amounts)\n    assert has_91_03 or all_aws_excluded, (\n        \"91.03 not in csv and AWS charges only partially excluded\"\n    )\n\n\n# ==========================================================\n# T-07: CSV has at least 5 unique amount values\n# ==========================================================\ndef test_csv_unique_amounts():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    unique = set(_amounts(rows))\n    assert len(unique) >= 5, f\"only {len(unique)} unique amounts\"\n\n\n# ==========================================================\n# T-08: CSV cloud hosting entries (amount > $50) — if any\n#       are present, there should be exactly 6\n# ==========================================================\ndef test_csv_cloud_entry_count():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    count = sum(1 for a in _amounts(rows) if a > 50)\n    if count > 0:\n        assert count == 6, f\"expected 0 or 6 cloud entries, got {count}\"\n\n\n# ==========================================================\n# T-09: Nov 1 has entries — at least 1 (GitHub); 2 if AWS\n#       is included\n# ==========================================================\ndef test_csv_nov_paired():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    nov = sum(1 for d in _dates(rows) if d == \"2025-11-01\")\n    assert nov >= 1, f\"Nov 1 has {nov} entries, need at least 1\"\n\n\n# ==========================================================\n# T-10: Apr 1 has paired entries (AWS + GitHub)\n# ==========================================================\ndef test_csv_apr_paired():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    apr = sum(1 for d in _dates(rows) if d == \"2026-04-01\")\n    assert apr >= 2, f\"Apr 1 has {apr} entries, need 2\"\n\n\n# ==========================================================\n# T-10: CSV has 6 GitHub entries at $4.00\n# ==========================================================\ndef test_csv_github_entries():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    count = sum(1 for a in _amounts(rows) if a == 4.0)\n    assert count == 6, f\"GitHub entries: {count} not 6\"\n\n\n# ==========================================================\n# T-11: CSV has Namecheap entry at $38.88\n# ==========================================================\ndef test_csv_namecheap():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    assert 38.88 in _amounts(rows), \"38.88 not in csv\"\n\n\n# ==========================================================\n# T-12: Namecheap duplicate collapsed (only 1 at $38.88)\n# ==========================================================\ndef test_csv_no_duplicate_namecheap():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    count = _amounts(rows).count(38.88)\n    assert count == 1, f\"38.88 appears {count} times\"\n\n\n# ==========================================================\n# T-13: No Amazon retail amounts in CSV\n# ==========================================================\ndef test_csv_no_amazon_retail():\n    rows = _load_csv()\n    assert rows is not None, \"csv not found\"\n    retail = [127.43, 54.99, 247.83, 29.99]\n    amounts = _amounts(rows)\n    for r in retail:\n        assert r not in amounts, f\"retail {r} in csv\"\n\n\n# ==========================================================\n# T-14: Snapshot services present and structurally intact\n# ==========================================================\ndef test_snapshot_unchanged():\n    import json\n    sp = _find_snapshot()\n    assert sp is not None, \"snapshot not found\"\n    raw = sp.read_text(encoding=\"utf-8\", errors=\"ignore\")\n    data = json.loads(raw)\n    svcs = [\"calendar\", \"contacts\", \"email\", \"fintrack\",\n            \"linear\", \"messaging\", \"reminder\", \"sonos\",\n            \"strava\", \"zillow\"]\n    for svc in svcs:\n        assert svc in data, svc + \" missing\"\n        assert isinstance(data[svc], dict), svc + \" bad\"\n\n\nif __name__ == \"__main__\":\n    pytest.main([str(Path(__file__).resolve()), \"-rA\", \"--tb=short\"])", "6a2e4c53cae99f56e3e572de.py": "#!/usr/bin/env python3\nimport sys\nimport subprocess\nimport importlib\nfrom pathlib import Path\n\n# --- pytest auto-install ---\ntry:\n    import pytest\nexcept ImportError:\n    print(\"pytest not found, installing...\")\n    subprocess.check_call([sys.executable, \"-m\", \"pip\", \"install\", \"pytest\"])\n    pytest = importlib.import_module(\"pytest\")\n\n# --- directory config ---\nTASK_DIR = Path(__file__).resolve().parent\nPROJECT_ROOT = TASK_DIR.parent\nWORKSPACE_DIR = Path(__file__).parent / \"workspace\"\n\n\ndef _search_bases():\n    # Where to look for agent output files.\n    return [\n        Path(__file__).parent / \"workspace\",\n        Path(__file__).parent,\n        WORKSPACE_DIR,\n        TASK_DIR,\n    ]\n\n\ndef _find_snapshot():\n    # Where to look for snapshots.json.\n    for path in (\n        Path.home() / \"snapshots.json\",\n        Path(__file__).parent / \"snapshots.json\",\n        Path(__file__).parent / \"workspace\" / \"snapshots.json\",\n        TASK_DIR / \"snapshots.json\",\n        TASK_DIR / \"snapshot.json\",\n    ):\n        if path.is_file():\n            return path\n    return None\n\n\ndef _find_memory_md():\n    # Find memory.md (case-insensitive stem).\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.md\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"memory\":\n                    return path.resolve()\n            except OSError:\n                continue\n    return None\n\n# --- tests go here ---\nimport re\n\n# ----------------------------------------------------------------------------\n# Expected values. Quotes, names, and dates come from the user's ATTACHED source\n# file (inputs/incident_notes_dump.txt), NOT from any universe/Notion record.\n# ----------------------------------------------------------------------------\nDEPLOY_IDS = [\"MERID-2025-1112\", \"MERID-2025-1119\", \"ATLAS-2025-1125\", \"BEACON-2026-0305\"]\nID_PATTERN = re.compile(r\"\\b[A-Z]+-\\d{4}-\\d{4}\\b\")\n\n# Full deployment-name label expected to sit beside each ID's section heading.\nDEPLOY_LABELS = {\n    \"MERID-2025-1112\": \"MERIDIAN PIPELINE\",\n    \"MERID-2025-1119\": \"MERIDIAN PIPELINE\",\n    \"ATLAS-2025-1125\": \"ATLAS INTEGRATION\",\n    \"BEACON-2026-0305\": \"BEACON PIPELINE\",\n}\nLABEL_WINDOW = 200  # max chars between the full label and its deployment ID\n\n# Direct quotes, exactly as written in the attached source, to be kept verbatim.\nQUOTE_MERID_1112_JUST_SHIP_IT = \"Just ship it. We'll fix in next sprint. Client needs this live by EOD tomorrow, skip the PII scan.\"\nQUOTE_MERID_1119_CLEAN_UP_NEXT_SPRINT = \"We'll clean up in the next sprint. Get it live tonight.\"\nQUOTE_MERID_1119_ONLINE_AND_PUSHING = \"Josh I need you online and pushing. Stop overthinking this. Ship it.\"\nQUOTE_MERID_1119_MISSED_STANDUP = \"Missed standup again - this is becoming a pattern. I need you online by 9 sharp tomorrow.\"\nQUOTE_ATLAS_1125_BEFORE_THE_HOLIDAY = \"The client needs this before the holiday. Skip the review, we do not have time. Get it done tonight.\"\nQUOTE_BEACON_0305_SKIP_REVIEW_FRIDAY = \"Skip the review, client needs it Friday. Full stop.\"\n\n# Accepted representations of the session date (2026-06-17), including day-first forms.\nSESSION_DATE = r\"(2026-06-17|June 17,? 2026|Jun\\.? 17,? 2026|17 June,? 2026|17 Jun\\.? 2026|06/17/2026|6/17/2026)\"\n\n\n# ----------------------------------------------------------------------------\n# Helpers\n# ----------------------------------------------------------------------------\ndef _named_md(basename):\n    \"\"\"All files with this exact basename across the search bases, deduped by resolved path.\"\"\"\n    found = {}\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(basename):\n            try:\n                if path.is_file() and path.name == basename:\n                    found[path.resolve()] = path\n            except OSError:\n                continue\n    return list(found.values())\n\n\ndef _chronology_paths():\n    return _named_md(\"incident_chronology.md\")\n\n\ndef _chron_text():\n    paths = _chronology_paths()\n    assert paths, \"incident_chronology.md not found in workspace or Docs folder\"\n    return paths[0].read_text()\n\n\ndef _min_distance(content, token_a, token_b):\n    \"\"\"Smallest gap between any occurrence of token_a and token_b (case-insensitive).\"\"\"\n    a_pos = [m.start() for m in re.finditer(re.escape(token_a), content, re.IGNORECASE)]\n    b_pos = [m.start() for m in re.finditer(re.escape(token_b), content, re.IGNORECASE)]\n    if not a_pos or not b_pos:\n        return None\n    return min(abs(a - b) for a in a_pos for b in b_pos)\n\n\ndef _assert_label_near_id(deploy_id):\n    content = _chron_text()\n    assert deploy_id in content, f\"{deploy_id} not present in chronology\"\n    label = DEPLOY_LABELS[deploy_id]\n    dist = _min_distance(content, label, deploy_id)\n    assert dist is not None and dist <= LABEL_WINDOW, f\"Exact label '{label}' not found within {LABEL_WINDOW} chars of {deploy_id} (distance={dist})\"\n\n\ndef _assert_quote_preserved(quote):\n    assert quote in _chron_text(), f\"Source quote not preserved verbatim: {quote!r}\"\n\n\n# ----------------------------------------------------------------------------\n# Deliverable structure\n# ----------------------------------------------------------------------------\ndef test_chronology_file_saved_in_docs_folder():\n    \"\"\"One incident_chronology.md deliverable exists, under a Docs directory; identical mirror copies are tolerated, divergent copies are not.\"\"\"\n    matches = _chronology_paths()\n    assert len(matches) >= 1, f\"Expected at least one incident_chronology.md, found {len(matches)}: {matches}\"\n    assert \"Docs\" in matches[0].parts, f\"incident_chronology.md is not inside a Docs directory: {matches[0]}\"\n\n\ndef test_chronology_contains_exactly_the_four_deployment_ids():\n    \"\"\"The document contains the four expected deployment IDs and no additional ones.\"\"\"\n    found = set(ID_PATTERN.findall(_chron_text()))\n    assert found == set(DEPLOY_IDS), f\"Deployment ID set mismatch. Expected {sorted(DEPLOY_IDS)}, found {sorted(found)}\"\n\n\ndef test_incidents_appear_in_chronological_order():\n    \"\"\"The four incidents appear in date order: MERID-1112, MERID-1119, ATLAS-1125, BEACON-0305.\"\"\"\n    content = _chron_text()\n    positions = [content.find(d) for d in DEPLOY_IDS]\n    assert all(p != -1 for p in positions), \"Not all deployment IDs are present\"\n    assert positions == sorted(positions), \"Incidents are not in chronological order (expected 1112, 1119, 1125, 0305)\"\n\n\n# ----------------------------------------------------------------------------\n# Full deployment-name label sits beside its ID\n# ----------------------------------------------------------------------------\ndef test_meridian_pipeline_section_labeled_with_merid_2025_1112():\n    \"\"\"The first Meridian section is labeled 'Meridian Pipeline' within 200 chars of MERID-2025-1112.\"\"\"\n    _assert_label_near_id(\"MERID-2025-1112\")\n\n\ndef test_meridian_pipeline_section_labeled_with_merid_2025_1119():\n    \"\"\"The second Meridian section is labeled 'Meridian Pipeline' within 200 chars of MERID-2025-1119.\"\"\"\n    _assert_label_near_id(\"MERID-2025-1119\")\n\n\ndef test_atlas_integration_section_labeled_with_atlas_2025_1125():\n    \"\"\"The Atlas section is labeled 'Atlas Integration' within 200 chars of ATLAS-2025-1125.\"\"\"\n    _assert_label_near_id(\"ATLAS-2025-1125\")\n\n\ndef test_beacon_pipeline_section_labeled_with_beacon_2026_0305():\n    \"\"\"The Beacon section is labeled 'Beacon Pipeline' within 200 chars of BEACON-2026-0305.\"\"\"\n    _assert_label_near_id(\"BEACON-2026-0305\")\n\n\n# ----------------------------------------------------------------------------\n# Direct quotes preserved verbatim from the attached source\n# ----------------------------------------------------------------------------\ndef test_ben_cho_quote_just_ship_it_preserved_verbatim():\n    \"\"\"Preserves the Nov 11 Meridian email quote 'Just ship it...skip the PII scan.' word for word.\"\"\"\n    _assert_quote_preserved(QUOTE_MERID_1112_JUST_SHIP_IT)\n\n\ndef test_ben_cho_quote_clean_up_next_sprint_preserved_verbatim():\n    \"\"\"Preserves the Nov 18 Meridian email quote 'We'll clean up in the next sprint...' word for word.\"\"\"\n    _assert_quote_preserved(QUOTE_MERID_1119_CLEAN_UP_NEXT_SPRINT)\n\n\ndef test_ben_cho_quote_online_and_pushing_preserved_verbatim():\n    \"\"\"Preserves the Nov 19 Meridian follow-up quote 'Josh I need you online and pushing...' word for word.\"\"\"\n    _assert_quote_preserved(QUOTE_MERID_1119_ONLINE_AND_PUSHING)\n\n\ndef test_ben_cho_quote_missed_standup_preserved_verbatim():\n    \"\"\"Preserves the Nov 20 Meridian standup email quote 'Missed standup again...' word for word.\"\"\"\n    _assert_quote_preserved(QUOTE_MERID_1119_MISSED_STANDUP)\n\n\ndef test_ben_cho_quote_before_the_holiday_preserved_verbatim():\n    \"\"\"Preserves the Nov 24 Atlas email quote 'The client needs this before the holiday...' word for word.\"\"\"\n    _assert_quote_preserved(QUOTE_ATLAS_1125_BEFORE_THE_HOLIDAY)\n\n\ndef test_ben_cho_quote_skip_review_friday_preserved_verbatim():\n    \"\"\"Preserves the Mar 5 Beacon email quote 'Skip the review, client needs it Friday. Full stop.' word for word.\"\"\"\n    _assert_quote_preserved(QUOTE_BEACON_0305_SKIP_REVIEW_FRIDAY)\n\n\n# ----------------------------------------------------------------------------\n# MEMORY.md session entry (located via the skeleton helper _find_memory_md)\n# ----------------------------------------------------------------------------\ndef test_memory_file_present_in_workspace():\n    \"\"\"A file named exactly MEMORY.md exists, discoverable through the skeleton helper.\"\"\"\n    mem = _find_memory_md()\n    assert mem is not None, \"MEMORY.md not found via _find_memory_md()\"\n    assert _named_md(\"MEMORY.md\"), \"No file with the exact basename MEMORY.md exists in the workspace\"\n\n\ndef test_memory_records_chronology_with_four_ids_and_session_date():\n    \"\"\"A single MEMORY.md line records all four deployment IDs together with the 2026-06-17 session date.\"\"\"\n    assert _find_memory_md() is not None, \"MEMORY.md not found via _find_memory_md()\"\n    for mem in _named_md(\"MEMORY.md\"):\n        for line in mem.read_text().splitlines():\n            if all(re.search(r\"\\b\" + re.escape(i) + r\"\\b\", line) for i in DEPLOY_IDS) and re.search(SESSION_DATE, line):\n                return\n    raise AssertionError(\"No single MEMORY.md line across the workspace records all four deployment IDs together with the 2026-06-17 session date\")\n\n\nif __name__ == \"__main__\":\n    pytest.main([str(Path(__file__).resolve()), \"-rA\", \"--tb=short\"])", "6a2e4c53cae99f56e3e57313.py": "#!/usr/bin/env python3\nimport sys\nimport subprocess\nimport importlib\nfrom pathlib import Path\n\n# --- pytest auto-install ---\ntry:\n    import pytest\nexcept ImportError:\n    print(\"pytest not found, installing...\")\n    subprocess.check_call([sys.executable, \"-m\", \"pip\", \"install\", \"pytest\"])\n    pytest = importlib.import_module(\"pytest\")\n\n# --- directory config ---\nTASK_DIR = Path(__file__).resolve().parent\nPROJECT_ROOT = TASK_DIR.parent\nWORKSPACE_DIR = Path(__file__).parent / \"workspace\"\n\n\ndef _search_bases():\n    # Where to look for agent output files.\n    return [\n        Path(__file__).parent / \"workspace\",\n        Path(__file__).parent,\n        WORKSPACE_DIR,\n        TASK_DIR,\n    ]\n\n\ndef _find_snapshot():\n    # Where to look for snapshots.json.\n    for path in (\n        Path.home() / \"snapshots.json\",\n        Path(__file__).parent / \"snapshots.json\",\n        Path(__file__).parent / \"workspace\" / \"snapshots.json\",\n        TASK_DIR / \"snapshots.json\",\n        TASK_DIR / \"snapshot.json\",\n    ):\n        if path.is_file():\n            return path\n    return None\n\n\ndef _find_memory_md():\n    # Find memory.md (case-insensitive stem).\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.md\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"memory\":\n                    return path.resolve()\n            except OSError:\n                continue\n    return None\n\n# --- tests go here ---\n\nimport re\nimport json\nfrom datetime import date\n\n# Universe-derived distance constants (snapshot total: 280468.4 m)\n_DIST_KM   = 280.4684\n_DIST_MI   = 174.274984\n_DIST_M    = 280468.4\n_TOL_KM    = 0.01\n_TOL_MI    = 0.01\n_TOL_M     = 0.5\n\n\ndef _find_ics():\n    \"\"\"Find health_calendar_q3.ics in workspace or task directory.\"\"\"\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for path in base.rglob(\"*.ics\"):\n            try:\n                if path.is_file() and path.stem.lower() == \"health_calendar_q3\":\n                    return path.resolve()\n            except OSError:\n                continue\n    return None\n\n\ndef _parse_vevents(ics_text):\n    \"\"\"Return list of dicts with SUMMARY and DTSTART for each VEVENT.\"\"\"\n    events = []\n    current = {}\n    in_event = False\n    for line in ics_text.splitlines():\n        line = line.strip()\n        if line == \"BEGIN:VEVENT\":\n            in_event = True\n            current = {}\n        elif line == \"END:VEVENT\":\n            if in_event:\n                events.append(current)\n            in_event = False\n            current = {}\n        elif in_event:\n            if line.startswith(\"SUMMARY:\"):\n                current[\"SUMMARY\"] = line[len(\"SUMMARY:\"):].strip()\n            elif line.startswith(\"DTSTART\"):\n                current[\"DTSTART\"] = line.split(\":\", 1)[-1].strip()\n            elif line.startswith(\"DESCRIPTION:\"):\n                current[\"DESCRIPTION\"] = line[len(\"DESCRIPTION:\"):].strip()\n    return events\n\n\ndef _dtstart_date(dtstart_str):\n    \"\"\"Parse a DTSTART value (YYYYMMDD or YYYYMMDDTHHmmssZ) into a date, or None.\"\"\"\n    val = dtstart_str.replace(\"Z\", \"\").split(\"T\")[0]\n    try:\n        return date(int(val[:4]), int(val[4:6]), int(val[6:8]))\n    except Exception:\n        return None\n\n\n# EV-001\ndef test_ics_exists():\n    \"\"\"health_calendar_q3.ics must exist in the workspace.\"\"\"\n    ics_path = _find_ics()\n    assert ics_path is not None, \"health_calendar_q3.ics not found in workspace or task directory\"\n    assert ics_path.is_file(), f\"Path {ics_path} is not a file\"\n\n\n# EV-002\ndef test_ics_vcalendar_structure():\n    \"\"\"ICS must be a syntactically valid VCALENDAR container.\"\"\"\n    ics_path = _find_ics()\n    assert ics_path is not None, \"health_calendar_q3.ics not found\"\n    text = ics_path.read_text(encoding=\"utf-8\", errors=\"replace\")\n    assert \"BEGIN:VCALENDAR\" in text, \"ICS missing BEGIN:VCALENDAR\"\n    assert \"END:VCALENDAR\" in text, \"ICS missing END:VCALENDAR\"\n\n\n# EV-003\ndef test_ics_all_dates_in_q3():\n    \"\"\"All VEVENTs must have a parseable DTSTART within 2026-07-01 through 2026-09-30.\"\"\"\n    ics_path = _find_ics()\n    assert ics_path is not None, \"health_calendar_q3.ics not found\"\n    events = _parse_vevents(ics_path.read_text(encoding=\"utf-8\", errors=\"replace\"))\n    q3_start = date(2026, 7, 1)\n    q3_end   = date(2026, 9, 30)\n    bad = []\n    for ev in events:\n        summary = ev.get(\"SUMMARY\", \"?\")\n        dtstart = ev.get(\"DTSTART\")\n        if not dtstart:\n            bad.append((summary, \"missing DTSTART\"))\n            continue\n        d = _dtstart_date(dtstart)\n        if d is None:\n            bad.append((summary, f\"unparseable DTSTART: {dtstart!r}\"))\n        elif not (q3_start <= d <= q3_end):\n            bad.append((summary, str(d)))\n    assert not bad, f\"VEVENTs with missing, unparseable, or out-of-range DTSTART: {bad}\"\n\n\n# EV-004 (valid implicit)\ndef test_ics_no_prohibited_content():\n    \"\"\"ICS must not contain practice, family, or financial content.\"\"\"\n    ics_path = _find_ics()\n    assert ics_path is not None, \"health_calendar_q3.ics not found\"\n    text = ics_path.read_text(encoding=\"utf-8\", errors=\"replace\").lower()\n    prohibited = [\n        \"orthodonti\", \"bracket\", \"braces\",\n        \"invoice\", \"billing\",\n        \"spouse\", \"wife\", \"husband\", \"child\", \"kids\",\n        \"finance\", \"tax\", \"budget\", \"mortgage\",\n    ]\n    hits = [p for p in prohibited if p in text]\n    assert not hits, f\"ICS contains prohibited content: {hits}\"\n\n\n# Valid implicit — Sep Mehta appointment\ndef test_ics_has_sep_mehta():\n    \"\"\"ICS must include a Dr. Mehta appointment in September 2026.\"\"\"\n    ics_path = _find_ics()\n    assert ics_path is not None, \"health_calendar_q3.ics not found\"\n    events = _parse_vevents(ics_path.read_text(encoding=\"utf-8\", errors=\"replace\"))\n    for ev in events:\n        if \"mehta\" not in ev.get(\"SUMMARY\", \"\").lower():\n            continue\n        d = _dtstart_date(ev.get(\"DTSTART\", \"\"))\n        if d and d.year == 2026 and d.month == 9:\n            return\n    assert False, \"No Dr. Mehta appointment found in September 2026 in ICS\"\n\n\n\n# EV-004/005 — two timed metformin events with distinct start times\ndef test_ics_has_morning_metformin():\n    \"\"\"ICS must include at least 2 metformin events (SUMMARY or DESCRIPTION) with at least 2 distinct timed DTSTARTs.\"\"\"\n    ics_path = _find_ics()\n    assert ics_path is not None, \"health_calendar_q3.ics not found\"\n    text = ics_path.read_text(encoding=\"utf-8\", errors=\"replace\")\n    assert \"metformin\" in text.lower(), \"ICS does not contain any metformin events\"\n    events = _parse_vevents(text)\n    met_events = [\n        ev for ev in events\n        if \"metformin\" in ev.get(\"SUMMARY\", \"\").lower()\n        or \"metformin\" in ev.get(\"DESCRIPTION\", \"\").lower()\n    ]\n    assert len(met_events) >= 2, (\n        f\"ICS has only {len(met_events)} metformin event(s); expected at least 2 (morning + evening)\"\n    )\n    times = set()\n    for ev in met_events:\n        tm = re.search(r\"T(\\d{4,6})\", ev.get(\"DTSTART\", \"\"))\n        if tm:\n            times.add(tm.group(1)[:4])  # normalize to HHMM for deduplication\n    assert len(times) >= 2, (\n        f\"Metformin events have fewer than 2 distinct timed DTSTARTs; found: {times}\"\n    )\n\n\n# EV-006 — MEMORY.md exists in workspace\ndef test_memory_exists():\n    \"\"\"MEMORY.md must exist as a file in the workspace.\"\"\"\n    memory_path = _find_memory_md()\n    assert memory_path is not None, \"MEMORY.md not found in workspace or task directory\"\n    assert memory_path.is_file(), f\"MEMORY.md path exists but is rkspace for prep-report content.\n    Returns the path of the first file whose content matches prep-note indicators.\"\"\"\n    keywords_needed = [\"garmin\"]\n    keywords_any = [\"readiness\", \"prep\", \"check\", \"appointment\", \"source\", \"status\", \"stale\", \"current\", \"calendar\", \"question\"]\n    for base in _search_bases():\n        if not base.exists():\n            continue\n        for pattern in (\"**/*.md\", \"**/*.txt\"):\n            for path in base.glob(pattern):\n                try:\n                    if not path.is_file():\n                        continue\n                    content = path.read_text().lower()\n                    if all(k in content for k in keywords_needed) and any(k in content for k in keywords_any):\n                        return path\n                except (OSError, UnicodeDecodeError):\n                    continue\n    return None\n\n\ndef _find_prep_events(events):\n    \"\"\"Find prep/device check events using broadened criteria matching prompt suggestions.\"\"\"\n    result = []\n    for e in events:\n        title = e.get(\"title\", \"\").lower()\n        if any(term in title for term in [\"prep check\", \"device check\"]):\n            result.append(e)\n        elif \"check\" in title and e.get(\"tag\") == \"personal\" and not any(\n            w in title for w in [\n                \"bloodwork\", \"honda\", \"flag\", \"garden\", \"writing\",\n                \"board\", \"morning\", \"tax\", \"lease\"\n            ]\n        ):\n            result.append(e)\n    return result\n\n\n# --- tests go here ---\n\nimport json\nimport re\nfrom datetime import datetime\n\n\ndef test_memory_file_exists():\n    mem_path = _find_memory_md()\n    assert mem_path is not None, \"memory.md file not found in workspace\"\n\n\ndef test_memory_records_conversation():\n    mem_path = _find_memory_md()\n    assert mem_path is not None, \"memory.md file not found\"\n    content = mem_path.read_text()\n    assert len(content.strip()) >= 50, \"memory.md has too little content to be substantive\"\n    content_lower = content.lower()\n    relevant_keywords = [\"garmin\", \"patel\", \"readiness\", \"sync\", \"prep\", \"appointment\", \"forerunner\"]\n    assert any(kw in content_lower for kw in relevant_keywords), (\n        f\"memory.md does not contain any task-relevant keywords ({relevant_keywords})\"\n    )\n\n\ndef test_snapshot_accessible():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n\n\ndef test_garmin_service_in_snapshot():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n    data = json.loads(snap_path.read_text())\n    assert \"garmin_health\" in data, \"garmin_health service not found in snapshot\"\n\n\ndef test_garmin_last_sync_date_extracted():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n    data = json.loads(snap_path.read_text())\n    assert \"garmin_health\" in data, \"garmin_health service missing\"\n    \n    devices = data[\"garmin_health\"].get(\"devices\", [])\n    assert len(devices) > 0, \"No Garmin devices found in snapshot\"\n    \n    forerunner = None\n    for device in devices:\n        if \"265\" in str(device.get(\"device_name\", \"\")):\n            forerunner = device\n            break\n    \n    assert forerunner is not None, \"Forerunner 265 device not found\"\n    assert \"last_sync\" in forerunner, \"last_sync field missing from Forerunner device\"\n    assert forerunner[\"last_sync\"] == \"2026-04-13T14:32:00\", f\"Expected last_sync 2026-04-13T14:32:00, got {forerunner['last_sync']}\"\n\n\ndef test_garmin_daily_stats_latest_date():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n    data = json.loads(snap_path.read_text())\n    \n    daily_stats = data[\"garmin_health\"].get(\"daily_stats\", [])\n    assert len(daily_stats) > 0, \"No daily stats found in Garmin data\"\n    \n    dates = [stat[\"date\"] for stat in daily_stats]\n    latest = max(dates)\n    assert latest == \"2026-04-13\", f\"Expected latest daily stats date 2026-04-13, got {latest}\"\n\n\ndef test_garmin_sleep_data_latest_date():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n    data = json.loads(snap_path.read_text())\n    \n    sleep = data[\"garmin_health\"].get(\"sleep\", [])\n    assert len(sleep) > 0, \"No sleep data found in Garmin\"\n    \n    dates = [s[\"date\"] for s in sleep]\n    latest = max(dates)\n    assert latest == \"2026-04-30\", f\"Expected latest sleep date 2026-04-30, got {latest}\"\n\n\ndef test_calendar_service_in_snapshot():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n    data = json.loads(snap_path.read_text())\n    assert \"calendar\" in data, \"calendar service not found in snapshot\"\n\n\ndef test_dr_patel_appointment_exists():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n    data = json.loads(snap_path.read_text())\n    \n    events = data[\"calendar\"].get(\"events\", [])\n    patel_events = [e for e in events if \"patel\" in e.get(\"title\", \"\").lower()]\n    assert len(patel_events) > 0, \"No Dr. Patel appointments found in calendar\"\n\n\ndef test_email_service_in_snapshot():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n    data = json.loads(snap_path.read_text())\n    assert \"email\" in data, \"email service not found in snapshot\"\n\n\ndef test_reminder_service_in_snapshot():\n    snap_path = _find_snapshot()\n    assert snap_path is not None, \"snapshots.json not found\"\n    data = json.loads(snap_path.read_text())\n    assert \"reminder\" in data, \"reminder service not found in snapshot\"\n\n\ndef test_contacts_service_in_snapshot():\n    snap_path = _find_snapshot()\n    assert snap_p
