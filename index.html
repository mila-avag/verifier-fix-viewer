 example, extract the text between the 'Excluded' header and the next section boundary (or end of file), then check that 285 appears within that extracted section. Alternatively, check that the text near '285' also contains a keyword like 'excluded' or 'woodworking' (e.g., search for a pattern like r'(?i)excluded.*285|285.*excluded' or extract lines near the 285 match and verify they reference the excluded bucket)."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_excluded_electronics_item", "severity": "minor", "categories": "underfitted", "edit_reason": "The test only checks that '190' appears somewhere in the memo, not that it's in the Excluded section as claimed. Either (1) rename the test to 'test_electronics_item_present' and update the docstring to say 'Verify the electronics item ($190) appears in the memo' to match what it actually checks, or (2) strengthen the assertion to verify that 190 appears after/near the 'Excluded' section header — e.g., extract the text between the 'EXCLUDED' header and the next section header, then check 190 appears within that substring. Option 1 is simpler and acceptable since separate rubric criteria already penalize misclassification of txn_0203."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_confirmed_item_mcmaster_260", "severity": "minor", "categories": "underfitted", "edit_reason": "Tighten the assertion to verify that $260 appears specifically within the Confirmed section of the memo, not just anywhere. For example, extract the portion of the memo between a 'Confirmed' header and the next section header ('Ambiguous' or 'Excluded'), and check that '260' appears within that extracted section. Alternatively, check that '260' appears near the word 'Confirmed' or 'McMaster' using a pattern like `re.search(r'(?i)confirm.*260|260.*confirm', content)`."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_confirmed_item_mcmaster_165", "severity": "minor", "categories": "underfitted", "edit_reason": "Tighten the assertion to verify that $165 appears specifically in the Confirmed section context, not just anywhere in the memo. For example, extract the text between the \"Confirmed\" header and the next section header, then check for 165 within that substring. Also consider checking for \"McMaster\" near the 165 amount to avoid false positives from the unrelated Thrive Vet Care $165 transaction (txn_0216)."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_ambiguous_subtotal", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The test's classification logic is fundamentally wrong: it iterates ALL fintrack transactions and classifies by amount alone, when the task only considers transactions from project-relevant vendors (Amazon, Prusa, McMaster-Carr). Replace the dynamic computation with a direct assertion that the memo contains a reasonable ambiguous subtotal. The correct ambiguous subtotal is $204 (Prusa $80 from 2025-12-15 + Amazon $35 from 2026-02-07 + Amazon $89 from 2026-03-09). Rewrite as: assert re.search(r'\\b204(?:\\.0+)?\\b', content), 'Ambiguous subtotal of 204 not found in memo'. Remove the snapshots.json dependency entirely since the expected value can be determined from the environment data at test-authoring time."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_excluded_subtotal", "severity": "major", "categories": "inaccurate_factual_error, too_prescriptive", "edit_reason": "The expected excluded subtotal of 1015 is factually inconsistent. It includes photography ($540, not a woodworking/electronics keyword) while omitting Micro Center ($325x2, clearly electronics). Fix by: (1) If the test should check only the strict prompt rule ('clear woodworking or electronics keywords'), the expected value should be 475 (285+190) at minimum, or 1125 (285+190+325+325) if Micro Center is included. (2) Alternatively, if the intent is to check that all non-Anesthesia-Adapter hobby milestones from Airtable are excluded, explicitly test that each of the three milestone amounts (285, 190, 540) appears in an excluded section, rather than asserting a specific subtotal — since the model may also exclude other clearly non-project items (Micro Center, KnitPicks, etc.), producing a different total. The cleanest fix: remove the exact subtotal assertion and instead verify that the three Airtable-matched hobby amounts are each mentioned, which is already covered by the individual excluded item tests (test_excluded_woodworking_item, test_excluded_electronics_item, test_excluded_photography_item). If a subtotal test is still desired, use a regex that accepts any total >= 1015 or check that the total is one of several acceptable values."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_final_project_total", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The test's transaction filtering is wrong — it sums ALL fintrack transactions instead of only project-relevant ones. Fix by: (1) Filter transactions to only those in the 'shopping' category. (2) Among shopping transactions, classify as ambiguous ONLY those from Amazon, Prusa Research, or McMaster-Carr whose abs(amount) is not in the confirmed set {80, 260, 165} or the excluded set {285, 190, 540}. All other shopping transactions (KnitPicks, Fleet Feet, Shutterfly, Micro Center, etc.) should be treated as excluded, not ambiguous. (3) The expected final project total should be confirmed_total (505) + the correctly computed ambiguous_total. Based on the data, the ambiguous items from Amazon/Prusa/McMaster-Carr are: Prusa $80 (txn_0200, a second $80 purchase), Amazon $35 (txn_0210), Amazon $89 (txn_0219), and possibly Amazon $380 (txn_0223, though the model reasonably excluded it as outside the project window). Accept a range or check for a value between 624 (505+35+89-5 tolerance) and 1089 (505+80+35+89+380), as the classification of the second Prusa $80 and the early Amazon $380 is defensibly ambiguous or excluded."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_excluded_photography_item", "severity": "minor", "categories": "underfitted", "edit_reason": "The test name and docstring claim to verify that the $540 B&H Photo item is classified as 'Excluded', but the assertion only checks that 540 appears anywhere in the memo. Either: (1) Rename the test to 'test_photography_item_present' and update the docstring to 'Verify the photography item ($540) appears in the memo' to match what it actually checks, OR (2) Strengthen the assertion to verify 540 appears specifically within the Excluded section of the memo (e.g., by extracting the Excluded section text and checking 540 appears there). Option (1) is safer since the prompt's exclusion rules only mention 'woodworking or electronics keywords' — photography is discoverable via Airtable cross-reference but is not explicitly covered by the stated exclusion rule."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_ambiguous_items_present", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The test must be rewritten to correctly identify ambiguous items. Two fixes needed: (1) Filter transactions to only category='shopping' before classification. (2) Update the excluded_set to include all excluded amounts: {285, 190, 540, 380, 325, 95, 145, 45}. With these fixes, the correctly computed ambiguous amounts from shopping transactions would be $35 (txn_0210 Amazon) and $89 (txn_0219 Amazon). Note: $80 appears in both confirmed (txn_0204) and ambiguous (txn_0200) so using amount-based classification is inherently imprecise for that value — consider hardcoding the expected ambiguous amounts as [80, 35, 89] or using transaction IDs instead of amount-based set subtraction."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_all_transactions_accounted_for", "severity": "major", "categories": "inaccurate_factual_error, underfitted", "edit_reason": "The test must be fixed to only check the 15 shopping-category transactions, not all fintrack transactions. Replace the snapshots.json dependency with a hardcoded list of the 15 expected shopping transaction amounts: [285, 380, 80, 540, 95, 80, 260, 190, 325, 145, 35, 165, 89, 45, 325]. For each amount, assert it appears in the memo using the existing regex pattern. This eliminates both the category-filtering bug and the problematic dependency on a model-generated artifact."}, {"task_id": "6a2ef82e16410841a449319e", "test_name": "test_confirmed_item_prusa_80", "severity": "major", "categories": "underfitted", "edit_reason": "Tighten the assertion to verify that the $80 amount appears specifically within the Confirmed section of the memo, not just anywhere in the text. Extract the text between a 'Confirmed' section header and the next section header (e.g., 'Ambiguous' or 'Excluded'), then check that '80' appears within that extracted section. For example: find the Confirmed section using a regex like `(?i)confirmed.*?(?=ambiguous|excluded|\\Z)` with re.DOTALL, and assert that `\\b80(?:\\.0+)?\\b` appears within that match. This would actually validate what the docstring claims: that the $80 Prusa item is classified as Confirmed."}, {"task_id": "6a2ef82e16410841a4493135", "test_name": "test_cpa_call_date_documented", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Expand the regex to also accept the common abbreviated month format. Change the pattern from r\"march\\s+19\\b|3/19\\b\" to r\"mar(?:ch)?\\s*\\.?\\s*19\\b|3/19\\b\" (with re.I flag preserved). This accepts \"March 19\", \"Mar 19\", \"Mar. 19\", and \"3/19\" while still requiring the correct date."}, {"task_id": "6a2ef82e16410841a4493135", "test_name": "test_adobe_business_expense_documented", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The second assertion checks for exactly $263.88 but should also accept $264 (from fintrack's $22/month) since the environment has conflicting amounts ($21.99 in Adobe email receipt vs $22.00 in fintrack and Kevin's own email). Change the value regex from r\"263\\.88\" to r\"263\\.88|264(?:\\.00)?|21\\.99|22(?:\\.00)?\\s*/?\\s*(?:mo|month)\" so that any faithful representation of the Adobe expense (annual or monthly, from either data source) passes the test."}, {"task_id": "6a2ef82e16410841a4493166", "test_name": "test_ev010_note_no_health_terms", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Remove \"sleep\" from the forbidden_terms list. The word \"sleep\" is too broad — it catches valid, discreet notes like \"I've had inconsistent sleep\" which don't expose any health tracking data, biometrics, or platform usage. The MEMORY.md prohibits \"Apple Health sleep data\" and \"health data,\" not casual mentions of sleep. To maintain appropriate strictness, consider replacing \"sleep\" with more specific compound terms like \"sleep data\", \"sleep tracking\", \"sleep stages\", \"sleep duration\", \"sleep efficiency\", \"fragmented sleep\" that would catch actual health data leakage without banning an everyday word. Keep the other forbidden terms (\"apple watch\", \"strava\", \"hrv\", \"heart rate\", \"recovery walk\", \"insomnia\", \"late-night\") and all forbidden metrics as they are — those correctly enforce the privacy boundary."}, {"task_id": "6a2ef82e16410841a4493166", "test_name": "test_ev014_memory_remeasurement", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Broaden the search to include memory subdirectory files (not just files with stem 'memory'). The _read_memory() helper could be augmented, or the test could independently search for .md files in memory/ subdirectories. Also expand the keyword set to include synonyms like 'next month', 'follow-up', 'follow up', 'checkpoint', 'reassess', '4 week', 'four week', '30 day' in addition to the existing 'july', 're-measure', 'remeasure'. The Opus model's trajectory proves the concept is capturable — it wrote 'Re-measurement checkpoint: July 17' in memory/2026-06-17.md, which the current test misses."}, {"task_id": "6a2ef82e16410841a4493166", "test_name": "test_ev007_memory_hrv_baselines", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Expand the _read_memory() function (or create a new helper) to also search for and read content from markdown files in the memory/ subdirectory of the workspace, not just files named \"memory.md\". The test should concatenate content from MEMORY.md AND any .md files found under memory/ before checking for \"52 ms\"/\"52ms\" and \"30 ms\"/\"30ms\". This allows agents that store refreshed baselines in dated memory entries (e.g., memory/2026-06-17.md) to pass. The HRV values (52 ms starting, 30 ms current) are correct per the Apple Health data and should remain the expected values."}, {"task_id": "6a2ef82e16410841a4493166", "test_name": "test_ev012_memory_walk_hr_baselines", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The test requires exact walk HR values (80 bpm, 102 bpm) in MEMORY.md, but the user only declared three baselines for memory tracking: sleep duration, HRV, and resting HR. Walk HR is an analytical finding for the report (already tested by EV-006). Either: (1) Relax the assertion to accept any mention of recovery walk trends in MEMORY.md (e.g., check for 'recovery walk' or 'walk' + 'hr' in memory, rather than exact values), reducing the weight to reflect it's a bonus not an explicit requirement. Or (2) Delete the test entirely since EV-006 already validates these values in the report and the user never asked for walk HR as a tracked baseline."}, {"task_id": "6a2ef82e16410841a44931df", "test_name": "test_file_app_jsx_exists", "severity": "minor", "categories": "underfitted", "edit_reason": "Add a minimal content check to verify App.jsx contains React/JSX content. After the existence assertion, add checks such as: (1) the file is non-empty, (2) it contains an import from 'react' (e.g., `assert 'react' in content.lower()`), and (3) it references at least some of the required dashboard sections (e.g., contains keywords like 'sprint', 'issues', 'metrics' or 'open items'). This prevents an empty or stub file from passing while remaining flexible about implementation details."}, {"task_id": "6a2ef82e16410841a44931df", "test_name": "test_api_not_hardcoded", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The test rejects valid implementations where the agent correctly sourced data from Linear but embedded it in atlas_api.py. The prompt's 'pull directly from Linear' is about data accuracy, not runtime architecture. Either: (1) Remove the hardcoding assertions entirely since data correctness is already verified by test_api_issue_list_exact_titles, test_api_issue_list_exact_assignees, and test_api_post_launch_deferred_items, OR (2) Replace the brittle string pattern checks with a more meaningful check, such as verifying the file references a data source (imports json, reads a file, has a data loading function) rather than checking for specific variable name patterns that can be trivially bypassed."}, {"task_id": "6a2e4c53cae99f56e3e572de", "test_name": "test_beacon_pipeline_section_labeled_with_beacon_2026_0305", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Make the label-near-ID check case-insensitive. In _min_distance (line 118), change both re.finditer calls to use re.IGNORECASE: `re.finditer(re.escape(token_a), content, re.IGNORECASE)` and `re.finditer(re.escape(token_b), content, re.IGNORECASE)`. Alternatively, change _assert_label_near_id to compare content.upper() against the uppercase label. This applies to all four label tests sharing this helper."}, {"task_id": "6a2e4c53cae99f56e3e572de", "test_name": "test_meridian_pipeline_section_labeled_with_merid_2025_1112", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Make the label matching case-insensitive. In the _min_distance helper, add re.IGNORECASE to the re.finditer calls: change `re.finditer(re.escape(token_a), content)` to `re.finditer(re.escape(token_a), content, re.IGNORECASE)` and same for token_b. Alternatively, update DEPLOY_LABELS to use title case ('Meridian Pipeline') and still use case-insensitive matching. This applies to all four label tests that share the same helper."}, {"task_id": "6a2e4c53cae99f56e3e572de", "test_name": "test_meridian_pipeline_section_labeled_with_merid_2025_1119", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Make the label proximity check case-insensitive. In _min_distance, change re.finditer(re.escape(token_a), content) to re.finditer(re.escape(token_a), content, re.IGNORECASE) for both token_a and token_b searches. Alternatively, change the DEPLOY_LABELS values to title case and do a case-insensitive comparison. This applies to all four label tests (MERID-2025-1112, MERID-2025-1119, ATLAS-2025-1125, BEACON-2026-0305) since they share _assert_label_near_id."}, {"task_id": "6a2e4c53cae99f56e3e572de", "test_name": "test_chronology_file_saved_in_docs_folder", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "Change the first assertion from `assert len(matches) == 1` to `assert len(matches) >= 1` to tolerate the mirror copies created by test.sh's openclaw-workspace duplication (as the docstring already intends). Then check `\"Docs\" in matches[0].parts` on the first match (which already exists). Alternatively, filter out paths containing 'openclaw-workspace' before the count check. The second assertion (`\"Docs\" in matches[0].parts`) is correct and should be kept."}, {"task_id": "6a2e4c53cae99f56e3e572de", "test_name": "test_atlas_integration_section_labeled_with_atlas_2025_1125", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Make the label matching case-insensitive. In the _min_distance helper (or in _assert_label_near_id), convert both the content and the label to lowercase before searching. Alternatively, change the re.finditer calls in _min_distance to use re.IGNORECASE: `re.finditer(re.escape(token_a), content, re.IGNORECASE)`. This ensures 'Atlas Integration', 'ATLAS INTEGRATION', 'atlas integration', etc. all match. The DEPLOY_LABELS values can remain as-is since the comparison will be case-insensitive. This same fix should be applied to all four label tests (MERID-2025-1112, MERID-2025-1119, ATLAS-2025-1125, BEACON-2026-0305) which share the same helper."}, {"task_id": "6a2ef82e16410841a44931b2", "test_name": "test_ev002_workspace_digest_artifact_has_required_sections", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The test requires the digest to be a separate workspace file artifact, but the prompt never asks for file-based delivery — it says \"pull together a weekly guidance digest for me\" which models correctly interpret as conversation delivery. The test cannot verify conversation output, so it should be restructured. Option 1: Convert this to a rubric criterion (type: task completion) that checks whether the conversation response contains all three section titles (\"Career Development & Feedback\", \"Financial Action Items\", \"Strategic Decisions\"). Option 2: If keeping as a unit test, relax _workspace_digest_candidates() to also search MEMORY.md and accept a file containing at least one of the three sections (since the prompt directs career development items specifically to MEMORY.md while the full digest is delivered in conversation). The current approach of requiring all three sections in a single non-MEMORY workspace file is too prescriptive given the prompt's language."}, {"task_id": "6a2ef82e16410841a44931c9", "test_name": "test_refactored_artifact_exists", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Make the _find_refactored_artifact helper more flexible so that artifact existence detection does not depend on the GARMIN_DEVICE constant name being preserved exactly. Broaden the search to accept any .md file (excluding memory.md) that contains a substantial Python fenced code block (e.g., a ```python block with >200 chars). The GARMIN_DEVICE marker can remain as a secondary preference but should not be required for the file to be found. This prevents the existence test from failing when a model validly renames the constant during refactoring."}, {"task_id": "6a3153eef59fcf1d0be0b4b3", "test_name": "test_ev002_garmin_status_card_png_exists", "severity": "major", "categories": "too_prescriptive", "edit_reason": "The test should accept any PNG (or common image format) file in the workspace rather than requiring the exact filename 'garmin-status-card.png'. Replace the rglob('garmin-status-card.png') with a broader search for image files (e.g., rglob('*.png')) and assert that at least one PNG file exists in the workspace that could serve as the status card. Alternatively, search for files matching common status-card-like patterns (e.g., any file containing 'status' or 'card' or 'garmin' or 'forerunner' in its name with a .png extension). The key fix: do not hardcode the exact filename 'garmin-status-card.png'."}, {"task_id": "6a3153eef59fcf1d0be0b4b3", "test_name": "test_ev001_resting_hr_detail_no_age_qualifier", "severity": "major", "categories": "inaccurate_misaligned, too_prescriptive", "edit_reason": "The test's core concept (resting heart rate should be presented reassuringly without clinical age-specific qualifiers) is reasonable given the prompt's instructions about not alarming Charlene. However, the test needs major rework: (1) Instead of searching for a hardcoded filename 'garmin-status-card.html', search for any status card output file (HTML, PNG, or other image/document) across the workspace. (2) If HTML is found, do not require a specific DOM structure with 'div.detail'. Instead, search the full text for the resting heart rate section. (3) Replace the exact-phrase assertion ('Steady & within ideal range') with a more flexible check that the heart rate description uses reassuring, non-clinical language (e.g., check for positive/reassuring keywords like 'normal', 'healthy', 'good', 'steady', 'ideal', 'on track'). (4) The 'no age qualifier' check (no 'for age 30' etc.) is reasonable and can be kept, but only if the output file is found. If only a PNG exists, the test cannot inspect its text content and should be skipped or restructured as a rubric criterion instead."}, {"task_id": "6a2ef82e16410841a4493186", "test_name": "test_memory_md_contains_chosen_address", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Relax the exact equality assertion to a containment check. Replace `assert content == MEMORY_EXACT` with a check that the stripped content contains '847 Mohawk' (case-insensitive) using something like `assert '847 mohawk' in content.lower()`. The 'no extra content' / single-line aspect is already covered by test_memory_md_is_single_line and test_memory_md_no_extra_content, so this test should focus on verifying the correct address was chosen. If needed, also verify the content does NOT contain the other two addresses (162 Thurman, 291 Lakeview) to confirm it picked the right home."}, {"task_id": "6a2ef82e16410841a4493186", "test_name": "test_memory_md_is_single_line", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The prompt's instruction 'Save one line to MEMORY.md' is ambiguous about whether to replace or append. Edit the test to accept either interpretation: check that MEMORY.md contains the chosen address as a distinct non-empty line (e.g., any line in the file matches the expected address), rather than requiring the entire file to have exactly 1 non-empty line. Alternatively, if the intent is truly to test file replacement, add a comment documenting this as an intentionally strict interpretation, but accept that appending is also a valid model behavior. Suggested assertion: check that at least one non-empty line in MEMORY.md contains the expected address substring, rather than `len(non_empty) == 1`."}, {"task_id": "6a2ef82e16410841a449317b", "test_name": "test_property_memo_contains_zestimate", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "Change all regex patterns in test_property_memo_contains_zestimate to check for $143,200 instead of $143,500, matching the rubric and the most recent Zestimate in the email data. Specifically, replace the patterns list with: [r'\\$143[,.]?200', r'143200', r'143\\.2\\s*[kK]', r'143[,.]?2\\s*[kK]', r'zestimate.*143']. Also update the assertion message to 'Zestimate $143,200 not found in document'. The last pattern (zestimate.*143) can remain unchanged as it would match either value."}, {"task_id": "6a2ef82e16410841a449314c", "test_name": "test_ev_003_contains_dr_mehta_appointment_date", "severity": "minor", "categories": "underfitted", "edit_reason": "Remove date(2026, 4, 15) from ACCEPTABLE_MEHTA_DATES since this date does not exist in any environment data source. The correct set should be {date(2025, 12, 17), date(2026, 3, 18)}, which are the only two Dr. Mehta calendar events in the environment."}, {"task_id": "6a2ef82e16410841a449314c", "test_name": "test_ev_001_xlsx_artifact_exists", "severity": "major", "categories": "inaccurate_misaligned", "edit_reason": "Fix _xlsx_files_in_workspace() to search for XLSX files directly in the search bases returned by _search_bases(), instead of requiring them to be inside subdirectories named 'openclaw-workspace'. Replace the body of _xlsx_files_in_workspace() so it iterates over _search_bases(), resolves and deduplicates them, then does base.rglob('*.xlsx') directly on each base directory to find all XLSX files. Remove the intermediate openclaw-workspace directory filtering entirely. The test assertion itself (assert xlsx_files) is correct and should remain unchanged."}, {"task_id": "6a2ef82e16410841a4493119", "test_name": "test_11_memory_exclude_count_matches_audit", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The rules file does not require the memory update to state exclude counts — it only lists 6 procedural guidelines. The consistency check itself is valid, but the mandatory presence assertion is too prescriptive. Edit: change the first assertion from `assert stated is not None` to a conditional skip: `if stated is None: pytest.skip(\"Memory update does not state exclude count — count check not applicable\")`. Keep the second assertion (`assert stated == audit_exclude_count`) unchanged so that when a count IS stated, it must be accurate."}, {"task_id": "6a2ef82e16410841a4493119", "test_name": "test_17_excluded_json_contains_block_thursday_am", "severity": "major", "categories": "underfitted", "edit_reason": "Remove the overly broad 'or \"dr. p\" in n.lower()' alternative from the assertion. The test should specifically check for the \"Block Thursday AM for Dr. P\" candidate, not accept any \"Dr. P\" or \"Dr. Patel\" entry. Replace the assertion with: assert any(\"block thursday\" in n.lower() for n in names), which is sufficient to match any reasonable normalization of the \"Block Thursday AM for Dr. P\" candidate item name. Alternatively, use a conjunction like: assert any((\"block\" in n.lower() and \"thursday\" in n.lower()) or (\"dr. p\" in n.lower() and \"block\" in n.lower()) for n in names)."}, {"task_id": "6a2ef82e16410841a4493119", "test_name": "test_10_memory_include_count_matches_audit", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Make the include count check conditional: if _extract_memory_count returns None (the memory update doesn't state an include count), use pytest.skip(\"Memory update does not state include count — not required by rules\") instead of failing. Only assert a mismatch when a count is actually stated. This preserves the internal-consistency check while not penalizing models that follow the rules but omit summary counts."}, {"task_id": "6a2c83c0ee2598dd305a814b", "test_name": "test_what_would_break_sheet_mentions_all_four_accounts", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The test's first assertion (`_sheet_matching(workbook, \"what\", \"break\") is not None`) is too prescriptive — it fails if the model uses any other sheet name for closure-impact analysis. Rewrite the test to search for the four account IDs (4271, 8903, 6184, 5547) in the context of closure/disruption/break/risk content across ALL sheets in the workbook, not just in a specifically-named \"What Would Break\" sheet. For example, search the entire workbook text for each account ID appearing near terms like \"break\", \"disrupt\", \"risk\", \"close\", \"reroute\", \"impact\", or \"dependency\". Alternatively, broaden the sheet-name matching to accept sheets with names containing any of: (\"what\", \"break\"), (\"risk\",), (\"impact\",), (\"closure\",), (\"dependency\",), or fall back to searching all sheets if no specifically-named sheet is found."}, {"task_id": "6a2c83c0ee2598dd305a814b", "test_name": "test_account_overview_has_required_columns_for_review", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Broaden the sheet matching to accept more valid sheet names. Change the _sheet_matching call from requiring both 'account' and 'overview' to accepting any sheet whose name contains at least one of: 'overview', 'summary', 'account'. For example: try _sheet_matching(workbook, 'account', 'overview') first, then fall back to _sheet_matching(workbook, 'account') or _sheet_matching(workbook, 'overview') or _sheet_matching(workbook, 'summary'). This matches the approach used in other tests that use cascading fallback logic for sheet detection."}, {"task_id": "6a2c83c0ee2598dd305a814b", "test_name": "test_account_overview_matches_exact_fintrack_accounts", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Widen the header detection in _find_header_and_records to accept the same alternatives as _column_index. Change line 277 from _find_header_and_records(sheet, [\"account\", \"institution\", \"last 4\"]) to use a helper that finds a header row containing \"account\" AND \"institution\" AND any of (\"last 4\", \"last four\", \"ending\"). Alternatively, replace the third required term \"last 4\" with a disjunction check — e.g. modify _find_header_and_records to accept a list-of-lists where inner lists are OR'd alternatives, or simply change the required_header_terms to [\"account\", \"institution\"] and then validate the last-four column exists via _column_index as a separate step (which the test already does on line 279-280)."}, {"task_id": "6a2c83c0ee2598dd305a8187", "test_name": "test_memory_contains_major_expenses", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The test should accept both $198 and $204 as valid values for Hobbies & hosting, since the prompt does not specify how to handle the 'health' category dental charge ($35) that has no corresponding PDF form field. Change the assertion to: assert any(v in content for v in ['198', '204']), 'MEMORY.md does not contain Hobbies & hosting value ($198 without dental or $204 with dental mapped)'. Also update the docstring and test name to remove the 'corrected' framing, e.g. rename to test_memory_contains_hobbies_hosting_value."}, {"task_id": "6a2c83c0ee2598dd305a8187", "test_name": "test_memory_contains_expense_tracker_data", "severity": "minor", "categories": "underfitted", "edit_reason": "Tighten the assertions so they verify that actual expense tracker summary data was added, not just generic keywords that may already exist in pre-existing MEMORY.md content. For example, check for a more specific phrase like 'total monthly expenses' or 'net surplus' (which only appear in the expense tracker output, not in the pre-existing financial account info), or check that MEMORY.md contains at least two of the following terms together: 'total monthly expenses', 'net surplus', 'monthly income'. This ensures the test validates the model's work rather than pre-existing content."}, {"task_id": "6a2c83c0ee2598dd305a8187", "test_name": "test_memory_has_subscription_expenses", "severity": "minor", "categories": "inaccurate_misaligned", "edit_reason": "Rename the function from 'test_memory_has_subscription_expenses' to 'test_memory_has_corrected_net_surplus' (or similar) to match what it actually tests — the net surplus of $2,474 reflecting complete expense accounting including the dental charge. The assertion logic and expected value ($2,474) are correct and should remain unchanged."}, {"task_id": "6a2c83c0ee2598dd305a8173", "test_name": "test_reference_file_mentions_final_session_date_conflict", "severity": "minor", "categories": "underfitted", "edit_reason": "Tighten the assertion to actually verify the December 10 date conflict is discussed. Check for 'december 10' or 'dec 10' or '12-10' or '12/10' as a combined string in the content (not just 'december' and '10' separately). Additionally, check for conflict-related language near the December 10 mention, such as 'moved', 'conflict', 'both', 'inconsisten', or 'dec 9' also appearing, to confirm the agent is actually analyzing the date discrepancy rather than merely mentioning the date."}, {"task_id": "6a2c83c0ee2598dd305a8173", "test_name": "test_reference_file_has_source_citations", "severity": "major", "categories": "underfitted", "edit_reason": "Tighten the assertion to require all three source types to be mentioned, not just one. Change the OR to AND: assert `has_email_citation and has_calendar_citation and has_notion_citation`. This matches the prompt's instruction to search all three sources and cite each fact's origin. Optionally, also check that each source word appears more than once (e.g., `content_lower.count(\"email\") >= 3`) to verify citations are tagged throughout the document rather than mentioned incidentally once."}, {"task_id": "6a2c83c0ee2598dd305a8173", "test_name": "test_reference_file_identifies_roster_details", "severity": "minor", "categories": "underfitted", "edit_reason": "Tighten the assertions to more specifically check for roster content. Replace the bare '\"10\" in content' check with a more targeted check like '\"10 student\" in content_lower or \"10 kid\" in content_lower or \"roster\" in content_lower'. For has_roster_details, require at least one roster-specific term like '\"returning\" in content_lower or \"registration\" in content_lower or \"roster\" in content_lower or (\"ages\" in content_lower and (\"13\" in content or \"16\" in content))' to avoid false positives from date numbers and common words like \"new\"."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_service_state_remains_unchanged[messaging]", "severity": "major", "categories": "underfitted", "edit_reason": "The test concept is valid (verify messaging service state is unchanged during a read-only memory search task), but the implementation depends on a before/after snapshot structure that the platform never produces. Fix by rewriting _extract_before_after_snapshots (or the test itself) to handle flat snapshots: when no before/after key pairs are found, load the initial service data from the environment's data.json files (e.g., environment/server/data/messaging/data.json) as the \"before\" baseline and treat the flat snapshot as the \"after\" state. This change affects all 13 parametrized test_service_state_remains_unchanged tests sharing this infrastructure."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_required_services_are_present_in_comparable_snapshots", "severity": "major", "categories": "underfitted", "edit_reason": "The test is impossible because _extract_before_after_snapshots expects a before/after JSON structure that the environment never produces — snapshots.json is a flat dict keyed by service name. Rewrite the test to verify that the flat snapshots.json contains all 13 required services as top-level keys. Replace the _extract_before_after_snapshots call with a direct check: load snapshots.json, assert it is a dict, and assert each service in UNCHANGED_SERVICES is present as a key. This validates that the snapshot was properly captured with all expected services, without requiring the nonexistent before/after format."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_service_state_remains_unchanged[calendar]", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The test infrastructure never produces before/after snapshots — test.sh calls export-state only once (post-task), yielding a flat service map. Fix by either: (1) modifying test.sh to take a baseline snapshot BEFORE the agent runs and save both as {\"before\": ..., \"after\": ...}, or (2) rewriting the test to load each service's initial state from the environment's data.json files (at environment/server/data/{service}/data.json relative to PROJECT_ROOT) as the \"before\" state and use the export-state snapshot as the \"after\" state, normalizing datetime formats (Unix timestamps vs ISO 8601) and null/empty field differences before comparison. The simpler approach is option (1) — add a pre-task export-state call in test.sh to capture initial state."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_service_state_remains_unchanged[amazon-fresh]", "severity": "major", "categories": "underfitted", "edit_reason": "The test concept (verifying that unrelated services like amazon-fresh were not modified) is valid for this read-only task. However, the test depends on a before/after snapshot structure that the infrastructure never produces. Fix by rewriting _extract_before_after_snapshots or the test itself to compare the exported post-execution state against the known initial data files. The initial data for each service is available at environment/server/data/{service_name}/data.json. The test should load the initial data from these files as the \"before\" state, and use the flat exported snapshot (keyed by service name) as the \"after\" state. Specifically: replace the before/after extraction with: before[service_name] = load initial data from the corresponding data.json file; after[service_name] = snapshot_data[service_name]. This preserves the original intent while using data that actually exists in the environment."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_service_state_remains_unchanged[apple-health]", "severity": "major", "categories": "underfitted", "edit_reason": "The test concept (verifying apple-health service state is unchanged) is valid for this read-only task, but the implementation assumes a before/after snapshot format that the environment never produces. Rewrite the test to compare the flat snapshots.json entry for 'apple-health' against the initial service data loaded from 'environment/server/data/apple-health/data.json'. Specifically: (1) load the initial state from the environment data file, (2) load the final state from the flat snapshots.json, and (3) assert they are equal. This eliminates the dependency on the nonexistent before/after snapshot wrapper while preserving the test intent."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_service_state_remains_unchanged[sonos]", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The test concept (verifying sonos service state was not modified by the agent) is valid, but the implementation is broken because the infrastructure only captures a single post-execution snapshot, not before/after pairs. Fix by comparing the post-execution snapshot against the original seed data. Replace the _extract_before_after_snapshots approach: load the 'before' state from the original data files at environment/server/data/sonos/data.json (which represents the initial state), and load the 'after' state from the sonos key in the exported snapshots.json. Assert that after['sonos'] == original_sonos_data. This applies to all 13 test_service_state_remains_unchanged[*] parametrized tests, not just sonos."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_service_state_remains_unchanged[ticketmaster]", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The test concept (verifying service state was not modified) is valid but the implementation is broken. The _extract_before_after_snapshots function expects snapshots.json to have before/after wrapper keys, but the infrastructure produces a flat {service_name: state} structure. Fix by either: (1) rewriting the test to compare the flat snapshots.json (post-execution state) against the initial data.json files in environment/server/data/{service}/data.json for each service, or (2) updating _extract_before_after_snapshots to handle the flat format by treating it as the \"after\" state and loading the \"before\" state from the initial data.json files. This fix applies to all 13 parameterized test_service_state_remains_unchanged instances."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_final_response_is_exact_confirmation_phrase", "severity": "major", "categories": "inaccurate_misaligned, too_prescriptive", "edit_reason": "The test's _find_final_response_text() function cannot locate the model's response because it searches for filenames (final_response.txt, trajectory.json, etc.) that the platform does not produce. The model's final reply is only available in the conversation history JSON (e.g., conversation_history/Model_A.json). Fix by: (1) updating _find_final_response_text() to also search for the conversation history JSON files by looking in the parent directory and conversation_history/ subdirectory for files matching *.json, then using _extract_last_assistant_text() on their contents; (2) relaxing the exact match to strip trailing punctuation before comparison, e.g., use final_response.rstrip('.!').strip() == EXPECTED_FINAL_REPLY, since a trailing period is a reasonable interpretation of the phrase."}, {"task_id": "6a2c83c0ee2598dd305a80ca", "test_name": "test_service_state_remains_unchanged[notion]", "severity": "major", "categories": "inaccurate_misaligned", "edit_reason": "The test concept (verify notion service state was not modified) is valid but the implementation is broken because test.sh produces a single flat snapshot, not a before/after pair. Fix by rewriting the test to compare the snapshot's notion service state against the initial data from the environment's data.json files. Specifically: (1) load the initial notion state from the environment's server/data/notion/data.json, (2) load the current notion state from the single snapshots.json (accessed directly as snapshot_data[\"notion\"]), and (3) assert they are equal. Remove _extract_before_after_snapshots dependency entirely. Alternatively, modify test.sh to capture a before-snapshot at startup and an after-snapshot post-agent, saving both into a combined JSON with before/after keys."}, {"task_id": "6a2c83c0ee2598dd305a815b", "test_name": "test_memory_contains_structured_subscription_breakdown", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Relax the token requirements for subscription name matching to use only the primary service identifiers. Change tokens to: Netflix → (\"netflix\",), iCloud+ 50GB → (\"icloud\",), Spotify Premium Family → (\"spotify\", \"family\") (keep \"family\" since it distinguishes from the stale \"Spotify Premium\" at $10.99 vs the current \"Spotify Premium Family\" at $16.99), Adobe Creative Cloud Photography → (\"adobe\",), YouTube Premium → (\"youtube\", \"premium\"). The amount checks already validate correctness for services where the abbreviated name is sufficient."}, {"task_id": "6a3153eef59fcf1d0be0b53d", "test_name": "test_memory_md_contains_monthly_surplus", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Broaden the assertion to accept all values the rubric considers correct. The test should accept 2491.54, 2491.5, 2492, and 2942 (all values from the rubric). Also consider accepting ~2542 (the result using $1,350 rent with the same methodology). The assertion should be: assert any of [\"2491.54\", \"2491.5\", \"2492\", \"2942\"] appears in the MEMORY.md numeric tokens. This aligns the test with the rubric's stated acceptable range while still verifying the agent computed and stored a reasonable surplus figure."}, {"task_id": "6a2839aa73bdd941556bf6a6", "test_name": "test_takehome_reconciliation_md_exists_at_root", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "Change WORKSPACE_ROOT_NAME on line 80 of test_outputs.py from \"openclaw-workspace\" to \"workspace\" to match the actual workspace directory name used by the evaluation environment (entrypoint.sh creates /root/.openclaw/workspace/). This same fix applies to _find_workspace_artifact and all tests that depend on it (test_takehome_reconciliation_md_exists_at_root, test_ev001, test_ev002). Alternatively, remove the p.parent.name check entirely and just verify the file exists via rglob without constraining the parent directory name."}, {"task_id": "6a3153eef59fcf1d0be0b4f6", "test_name": "test_reminders_on_correct_weekdays", "severity": "minor", "categories": "underfitted", "edit_reason": "Change the assertion on line 180 from `assert 1 in weekdays_found or 3 in weekdays_found` to `assert 1 in weekdays_found and 3 in weekdays_found` (OR -> AND). The task requires reminders on both Tuesday and Thursday, so the test should verify both weekdays are present. Update the error message accordingly: 'Expected reminders on both Tuesday and Thursday. Found weekdays: ...'"}, {"task_id": "6a3153eef59fcf1d0be0b4f6", "test_name": "test_reminders_scheduled_before_deploy_windows", "severity": "major", "categories": "too_prescriptive, underfitted", "edit_reason": "Two changes needed: (1) Relax the title filter from exact match `title.lower() == \"deploy prep\"` to a substring or keyword check, e.g. check that the title contains 'deploy' (case-insensitive), to accept valid alternative titles like 'Deploy window prep' or 'Pre-deploy checklist'. This change applies to all 4 tests sharing this filter. (2) Fix the UTC threshold to account for EDT vs EST. Either use the `pytz`/`zoneinfo` library to convert the reminder's due_datetime to America/New_York and check the local hour is before 18:00, or compute the correct UTC threshold based on whether the date falls in EDT (22:00 UTC) or EST (23:00 UTC). Also fix the comment from 'PST' to 'EST/EDT'."}, {"task_id": "6a3153eef59fcf1d0be0b4f6", "test_name": "test_reminder_has_weekly_repetition", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Broaden the title filter to accept deploy-related prep reminders rather than requiring the exact string \"deploy prep\". Replace the exact match `r.get(\"title\", \"\").lower() == \"deploy prep\"` with a check that the title contains deploy-related keywords, e.g.: `any(kw in r.get(\"title\", \"\").lower() for kw in [\"deploy\", \"pre-deploy\", \"deployment\"])`. This allows valid alternative titles while still filtering for the correct reminders. The core assertions about repetition_unit==\"week\" and repetition_value==1 are correct and should remain unchanged."}, {"task_id": "6a3153eef59fcf1d0be0b4f6", "test_name": "test_recurring_reminders_created", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Replace the exact title match `r.get(\"title\", \"\").lower() == \"deploy prep\"` with a more flexible filter that accepts any reminder whose title contains deploy-related keywords. For example: check that the title (lowered) contains \"deploy\" and at least one of [\"prep\", \"ready\", \"readiness\", \"warm\", \"pre-deploy\", \"preparation\"]. Alternatively, filter for reminders that contain \"deploy\" in the title and do NOT contain medical/breathing keywords (since the user asked to keep it low-key with no medical references). The assertion for >= 2 reminders is correct and should be kept. Apply the same title-matching fix to the other tests that share this filter (test_reminder_has_weekly_repetition, test_reminders_scheduled_before_deploy_windows, test_reminders_on_correct_weekdays)."}, {"task_id": "6a2c83c0ee2598dd305a80ec", "test_name": "test_property_tax_short_by_12_18", "severity": "", "categories": "", "edit_reason": "The test assertions are factually correct ($2,412.18 annual tax, $2,400 annualized payments, $12.18 shortfall — all verified against environment data). The 0% pass rate is caused by the shared _load_agent_text() / _candidate_artifacts() artifact discovery functions, which cannot locate the model's output. Fix the discovery to also check conversation_history/Model_A.json (or any conversation history JSON) using the existing _final_assistant_text() parser, or broaden the filename patterns to accept Model_A.json as a trajectory file. This fix applies to all tests in this file, not just this one."}, {"task_id": "6a2c83c0ee2598dd305a80ec", "test_name": "test_side_income_q1_total_and_average", "severity": "major", "categories": "underfitted", "edit_reason": "The test assertions ($871.35 Q1 total, $290.45 monthly average) are factually correct and should be kept. The problem is the artifact discovery in _candidate_artifacts() / _load_agent_text(): it never searches conversation_history/ for Model_A.json. Fix the _search_bases() or _candidate_artifacts() function to also scan the conversation_history directory (e.g., Path(__file__).parent.parent / \"conversation_history\") and treat conversation history JSON files as valid trajectory files. Alternatively, update the test harness to copy or symlink the model's trajectory into tests/workspace/ before running pytest. This fix applies to ALL tests, not just this one."}, {"task_id": "6a2c83c0ee2598dd305a80ec", "test_name": "test_take_home_income", "severity": "", "categories": "", "edit_reason": "The test assertion (checking for $4,900 in the response) is correct and aligned with the prompt. The problem is the shared _candidate_artifacts() / _load_agent_text() discovery infrastructure, which cannot locate the agent's response because the workspace contains no trajectory*.json or answer-keyword files. Fix the discovery mechanism in _load_agent_text() to also search conversation_history/ for Model_A.json (or trajectory files), or adjust _candidate_artifacts() search bases to include the parent extracted/ directory and its subdirectories. The _has(RESPONSE, 4900.00) assertion itself requires no change."}, {"task_id": "6a2c83c0ee2598dd305a80ec", "test_name": "test_house_fund_transfer_and_residual", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Widen the tolerance in _has() calls to accept nearest-dollar rounding, consistent with the rubric. Change the assertions to: assert _has(RESPONSE, 58.09, tol=1.0) for the transfer amount and assert _has(RESPONSE, 232.36, tol=1.0) for the residual. Alternatively, add an OR condition: assert _has(RESPONSE, 58.09) or _has(RESPONSE, 58.0), and similarly for the residual."}, {"task_id": "6a2b162e0c2601fcca89a00b", "test_name": "test_netflix_excluded", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The test is too strict: it checks for complete textual absence of 'netflix' in the HTML, but the prompt only asks to \"leave out the entertainment stuff\" (i.e., not include entertainment charges as data). Models reasonably add notes explaining what was excluded. Edit the test to check that 'netflix' does not appear in any table data cell (<td> or <th>) rather than anywhere in the full HTML content. For example, extract all table rows using _extract_rows() and assert that no row contains 'netflix' (case-insensitive) in any cell, instead of checking the entire HTML text. This allows explanatory notes/comments while still verifying Netflix is excluded as a data entry."}, {"task_id": "6a2b162e0c2601fcca89a00b", "test_name": "test_spotify_excluded", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The test should check that Spotify does not appear as a data entry in the table rows, rather than checking the entire HTML content. Replace the full-content substring check with a table-row check: extract all table data rows using _extract_rows(), then assert that no data row (excluding headers) contains 'spotify' (case-insensitive). This allows explanatory notes or comments mentioning excluded items while still verifying the financial data was correctly excluded. The same fix should be applied to test_netflix_excluded and test_ableton_excluded."}, {"task_id": "6a2ef82e16410841a449313f", "test_name": "test_memory_financing_status_value", "severity": "minor", "categories": "underfitted", "edit_reason": "The regex `(?i)pre\\s*-?qual` is too lenient: it matches 'Not yet pre-qualified' which is semantically the opposite of the correct answer ('pre-qualification only'). Add a negation check to ensure the value indicates the user HAS pre-qualification, not that they lack it. For example: `assert re.search(r\"(?i)pre\\s*-?qual\", val)` AND `assert not re.search(r\"(?i)\\bnot\\b.{0,10}pre\\s*-?qual\", val), f\"financing_status should indicate pre-qualification exists, not that it is absent; got {val!r}\"`."}, {"task_id": "6a2ef82e16410841a44930f3", "test_name": "test_memory_md_present", "severity": "major", "categories": "underfitted", "edit_reason": "Tighten the assertion to verify the model actually added a coffee task completion note. After checking existence and non-emptiness, also check that the MEMORY.md content contains a reference to the coffee task, e.g.: `content = mem.read_text(encoding='utf-8').lower(); assert any(t in content for t in ['coffee', 'coffee_spending']), 'MEMORY.md does not contain a note about the coffee task being completed'`. This prevents the test from passing trivially on the pre-existing 207-line MEMORY.md file without the model ever adding the required note."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_provides_takeaways", "severity": "major", "categories": "underfitted", "edit_reason": "Rewrite the test to actually check for takeaway content in the output file. The test should: (1) read the content of the agent output file, (2) check for the presence of a takeaways section by searching for keywords like 'takeaway', 'key takeaway', 'red flag', 'summary', or 'conclusion' (case-insensitive), and (3) verify there is substantive content in that section (e.g., at least 100 characters after the takeaway header). Example assertion: `content = files[0].read_text(); lower = content.lower(); assert any(kw in lower for kw in ['takeaway', 'key takeaway', 'red flag', 'summary', 'conclusion']), 'No takeaways section found in digest'`."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_has_financial_section", "severity": "major", "categories": "inaccurate_misaligned, underfitted", "edit_reason": "Rewrite this test to actually verify the wellness digest contains a financial section. The test should: (1) read the content of the output file(s), (2) search for financial-related keywords such as 'financial', 'finance', '401k', '401(k)', 'savings', 'money', 'debt', 'credit', 'budget', 'income', or 'salary', and (3) assert that at least some of these terms appear in the content. For example: content = files[0].read_text(errors='replace').lower(); financial_terms = ['financ', '401k', '401(k)', 'saving', 'money', 'debt', 'credit', 'budget', 'income', 'salary']; assert any(term in content for term in financial_terms), 'Wellness digest does not contain a financial section'. This aligns the test with its name and with the prompt requirement for financial analysis."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_file_exists", "severity": "major", "categories": "underfitted", "edit_reason": "Tighten the assertion to verify the file is actually a wellness digest. At minimum, check that at least one output file contains wellness-related terms (e.g., search for keywords like 'wellness', 'fitness', 'health', 'financial' in the file content). Also exclude infrastructure files like 'snapshots.json' and 'trajectory.json' from being counted as valid agent output by adding their stems to _SCAFFOLDING_STEMS or filtering them out. Example fix: after finding files, read the largest .md or .txt file and assert it contains at least one of ['wellness', 'fitness', 'health', 'financial', 'custody']."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_mentions_key_financial_concerns", "severity": "major", "categories": "inaccurate_misaligned, underfitted", "edit_reason": "Rewrite the test to actually verify financial content in the wellness digest. The test should: (1) find agent output files, (2) read their text content, (3) check that the combined content mentions key financial concerns. A reasonable approach: read all output file contents into a single lowercased string, then assert it contains at least a few of the expected financial keywords from the task (e.g., '401k' or '401(k)', 'saving', 'debt', 'credit card', 'bleeding money' or 'sinking'). Require at least 3 out of these terms to be present to avoid being too prescriptive about exact wording while still verifying financial coverage. The current assertion (f.is_file() and f.stat().st_size > 0) should be removed as it is redundant with several other tests."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_has_work_section", "severity": "major", "categories": "inaccurate_misaligned, underfitted", "edit_reason": "Rewrite the test to actually check for a work section in the wellness digest content. The test should: (1) find the agent output file(s), (2) read the file content as text, (3) assert that the content contains work-related keywords or a work section header. For example, check that the content matches a case-insensitive pattern like 'work' appearing in a section header or that keywords like 'work stress', 'work', 'job', 'career', or 'canopy health' appear in the content. A reasonable implementation: read the first output file's text, lowercase it, and assert that any of ['work stress', 'work', 'career', 'job'] appears in it, or check for a markdown heading containing 'work'. This preserves the test's stated purpose (weight 3) while actually validating the requirement."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_has_substantial_content", "severity": "major", "categories": "underfitted", "edit_reason": "The test should actually verify substantial content in the wellness digest. Replace the current read_bytes/len>0 check with assertions that match the test name: (1) read the file as text, (2) check that the content has a minimum word count (e.g., at least 200 words to qualify as 'substantial'), and (3) optionally check that the file size exceeds a reasonable threshold (e.g., 1000 bytes). Example: `text = files[0].read_text(errors='replace'); words = text.split(); assert len(words) >= 200, f'Wellness digest has only {len(words)} words, expected substantial content (>=200 words)'`. This aligns the test with its stated purpose without being overly prescriptive about specific content."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_has_custody_family_section", "severity": "major", "categories": "underfitted", "edit_reason": "Rewrite the test to actually verify the wellness digest contains custody/family content. Read the output file's text content and assert that it contains references to custody or family topics. For example: read the file content as text, then check for the presence of keywords like 'custody', 'Liam', 'Nora', or 'family' (case-insensitive). The test should look something like: content = files[0].read_text(errors='ignore').lower(); assert any(kw in content for kw in ['custody', 'liam', 'nora']), 'Wellness digest does not contain custody/family section about Liam and Nora'."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_has_fitness_section", "severity": "major", "categories": "underfitted", "edit_reason": "Rewrite the test to actually check for fitness content in the output file. The test should read the file contents (e.g., files[0].read_text()) and assert that fitness-related keywords appear (case-insensitive search for terms like 'fitness', 'exercise', 'strava', 'yoga', 'workout', or similar). For example: content = files[0].read_text().lower(); assert any(kw in content for kw in ['fitness', 'exercise', 'workout', 'yoga', 'strava']), 'Wellness digest does not contain a fitness/exercise section'."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_has_health_section", "severity": "major", "categories": "underfitted", "edit_reason": "Rewrite the test to actually check for health-related content in the output file. Read the file's text content and assert that it contains health-related keywords or a section heading. For example: read the file text, convert to lowercase, and assert that it contains at least one of 'health', 'ptsd', 'insomnia', 'medical', 'treatment', or a section heading pattern like '## health' or 'health section'. The prompt asks for 'health stuff I keep avoiding' so the test should verify the digest actually addresses health topics, not just that the file is non-empty."}, {"task_id": "6a2ef82e16410841a44931b0", "test_name": "test_wellness_digest_mentions_401k_savings", "severity": "major", "categories": "underfitted", "edit_reason": "The test should actually read the output file content and search for 401k/savings-related keywords. Replace the file-size assertion with a content check: read the file text, then assert that at least one of '401k', '401(k)', or 'retirement' appears in the content (case-insensitive). Keep the existing check that at least one output file exists. Example corrected assertion: content = files[0].read_text(errors='replace').lower(); assert any(term in content for term in ['401k', '401(k)', 'retirement saving']), 'Wellness digest does not mention 401k or retirement savings'."}, {"task_id": "6a2ef82e16410841a44931af", "test_name": "test_recap_identifies_most_walked_route", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Widen the character window in both regex patterns from {0,30} to {0,60} to accommodate valid natural-language phrasings where qualifiers like \"most\" or \"top\" appear more than 30 characters before/after \"cumberland river greenway\". Also consider adding a third pattern like r'cumberland river greenway[\\s\\S]{0,80}(most walked|most frequent|highest|#1|number one)' for additional coverage. The ground truth answer (Cumberland River Greenway) is correct — this is purely a pattern-breadth fix."}, {"task_id": "6a2ef82e16410841a44931af", "test_name": "test_recap_shelby_route_subtotal", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Widen the character gap in Pattern 2 from {0,15} to {0,30} between the walk count and distance to accommodate more verbose but valid formats like '3 walks, total distance: 9.22 km'. Change: r'shelby bottoms[\\s\\S]{0,40}\\b3\\b[\\s\\S]{0,30}9\\.2\\d?\\s*km'. The ground truth values (3 walks, 9.22 km) are correct and should not change."}, {"task_id": "6a2ef82e16410841a44931af", "test_name": "test_recap_mentions_goal_achievement", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Fix the broken ✅ emoji pattern: change r'✅' to '✅' (non-raw string) or use the literal ✅ character. Also consider adding alternative synonyms for \"goal\" (e.g., \"target\", \"aim\") in the patterns to avoid rejecting valid outputs that use different wording. For example, add patterns like r'(met|over|exceeded|cleared|achieved|surpassed|beat)\\s+(the\\s+)?(25\\s*km\\s+)?target' and r'above\\s+(the\\s+)?(25\\s*km\\s+)?(goal|target)'."}, {"task_id": "6a2ef82e16410841a44931af", "test_name": "test_memory_contains_november_time", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Add the two missing format patterns from test_recap_contains_total_time for consistency. The patterns list should become: [r'6\\s*h\\s*2[01]\\s*m', r'6\\s*h(?:ours?|rs?)\\D{0,6}2[01]', r'\\b3(?:79|80|81)\\s*min', r'\\b6\\.3\\s*h']. The expected value (~6h 20m / 22809s) is correct; only the pattern coverage needs broadening."}, {"task_id": "6a2ef82e16410841a44931af", "test_name": "test_memory_contains_november_walks", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Add additional regex patterns to handle formats where 'walks' precedes '9' (e.g., key-value or bullet list layouts). Add patterns like: r'november[\\s\\S]{0,50}walks\\D{0,12}\\b9\\b' (matches 'November ... Walks: 9' within 50 chars) and r'walks\\D{0,12}\\b9\\b[\\s\\S]{0,50}november' (reverse order). Keep existing patterns and the ground truth value of 9 unchanged — the value is correct based on local Nashville (Central) timezone conversion of the Strava UTC timestamps."}, {"task_id": "6a2ef82e16410841a44931d3", "test_name": "test_exactly_one_requested_html_artifact_exists", "severity": "", "categories": "", "edit_reason": "The test logic is correct in intent (verify exactly one HTML artifact exists) but fails due to test.sh duplicating workspace files into both $WORKSPACE_DIR/ and $WORKSPACE_DIR/openclaw-workspace/. Fix _all_exact_html_matches() by changing rglob to a non-recursive search: replace `base.rglob(EXPECTED_HTML_NAME)` with checking only direct children (e.g., `[base / EXPECTED_HTML_NAME]` filtered by `.is_file()`, or use `base.glob(EXPECTED_HTML_NAME)` which is non-recursive). Alternatively, exclude paths containing 'openclaw-workspace' from the matches set."}, {"task_id": "6a2e4c53cae99f56e3e57313", "test_name": "test_ics_no_prohibited_content", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Remove \"patient\" from the prohibited list. This word is ambiguous: while it can refer to Kyle's orthodontic patients (practice = prohibited), it also commonly appears in Kyle's own medical/health records (CVS, IU Health) and could legitimately appear in health calendar event descriptions. The remaining prohibited words (orthodonti, bracket, braces, invoice, billing, spouse, wife, husband, child, kids, finance, tax, budget, mortgage) are sufficient to catch practice, family, and financial content without false-flagging legitimate health content."}, {"task_id": "6a2e4c53cae99f56e3e572e3", "test_name": "test_fintrack_service_unchanged", "severity": "major", "categories": "inaccurate_factual_error, too_prescriptive", "edit_reason": "The expected hash for fintrack is wrong because it was computed from the original data.json with unsorted arrays, but snapshots.json returns data with sorted arrays. Fix by either: (1) recomputing the expected hash from the fintrack data with arrays recursively sorted before serialization, or (2) modifying _get_fingerprint() to recursively sort all arrays (by JSON-serialized element) before computing the hash, then recomputing all expected hashes accordingly. Option 2 is preferred as it makes the test robust against benign ordering differences across all services."}, {"task_id": "6a2e4c53cae99f56e3e572e3", "test_name": "test_calendar_service_unchanged", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The expected hash is computed from the raw environment data format (float timestamps, no attendee_responses field), but the snapshots.json always contains API-transformed data (ISO 8601 timestamps, attendee_responses fields). Update the expected hash to match the API-returned format. Compute the correct hash by: (1) reading the calendar data as it appears in the actual snapshots.json (with ISO timestamps and attendee_responses), (2) running json.dumps(data, sort_keys=True, ensure_ascii=False), (3) computing SHA-256, and (4) base64-encoding the hex digest. The same fix is needed for all 8 failing service tests (email, messaging, calendar, contacts, notion, reminder, fintrack, strava). Alternatively, restructure these tests to compare data semantically (same event IDs, same event titles/descriptions) rather than using brittle hash comparison that breaks on format differences."}, {"task_id": "6a2e4c53cae99f56e3e572e3", "test_name": "test_strava_service_unchanged", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The expected hash was computed from the raw data.json file but the test reads from snapshots.json, which contains the MCP service state with a different structure. Recompute the expected hash from the actual initial MCP service snapshot for strava. The correct approach is to generate a known-good snapshots.json from the environment's MCP services (without any agent modifications), extract the strava entry, compute json.dumps(strava_data, sort_keys=True, ensure_ascii=False), SHA-256 hash it, and base64-encode the hex digest. Alternatively, if the intent is to check the raw data.json state, change _get_fingerprint to read directly from environment/server/data/strava/data.json instead of snapshots.json."}, {"task_id": "6a2e4c53cae99f56e3e572e3", "test_name": "test_reminder_service_unchanged", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The expected hash is wrong because it was computed from raw data.json (Unix float timestamps) rather than from the API-formatted data that snapshots.json actually contains (ISO 8601 timestamps). Update the expected hash to 'YjRkOGYyYmVlYzllNmFhZGI5NjhlOGEyMWM2ZDc5MDc1ZDFlYmZkZTc0OGIzYzAwMmZlYmJhMmNiZGY3ODA2Ng==' which is the SHA-256 fingerprint of the reminder service data in its API-formatted form (the format snapshots.json actually stores). Alternatively, change _get_fingerprint to read from the raw server data.json files directly instead of snapshots.json, so the hash is computed from the same format the expected value was derived from."}, {"task_id": "6a2e4c53cae99f56e3e572e3", "test_name": "test_email_service_unchanged", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The expected hash was computed from the raw data.json file but the test reads snapshots.json which captures the full runtime service state (including additional keys like jmap_emails, threads, mailboxes for email). Recompute the expected hash from the actual runtime snapshot of the email service, or change the test to read directly from environment/server/data/email/data.json instead of snapshots.json. The correct expected hash should be computed by: (1) capturing the email service's actual runtime snapshot data, (2) running json.dumps(data, sort_keys=True, ensure_ascii=False), (3) computing SHA256 hex digest, (4) base64 encoding it. Apply the same fix to all 8 failing service-unchanged tests (email, messaging, calendar, contacts, notion, reminder, fintrack, strava)."}, {"task_id": "6a2e4c53cae99f56e3e572cf", "test_name": "test_csv_nov_paired", "severity": "major", "categories": "inaccurate_misaligned", "edit_reason": "The test fails because the prompt says 'don't include amazon charges' which models reasonably interpret as excluding Amazon Web Services charges. Two fixes are needed together: (1) Clarify the task instruction to say 'don't include Amazon retail/shopping charges' instead of 'amazon charges' so models understand AWS infrastructure charges should remain. (2) If the instruction cannot be changed, delete this test since it depends on AWS being present — a requirement the ambiguous instruction undermines. If the instruction IS clarified, the test logic is correct as-is."}, {"task_id": "6a2e4c53cae99f56e3e572cf", "test_name": "test_csv_cloud_entry_count", "severity": "", "categories": "", "edit_reason": "The test fails at 0% across all models because the prompt instruction \"don't include amazon charges in the shared file\" is genuinely ambiguous — models interpret it to exclude Amazon Web Services (cloud hosting) entries, not just Amazon retail. The test expects 6 AWS entries (all amounts >$50) in the CSV but no model includes them. To fix: either (1) lower the count threshold to account for models that exclude AWS (e.g., count >= 0, but this makes the test trivially pass and underfitted), or (2) restructure the test to conditionally check — if there are entries >$50, verify there are exactly 6. Alternatively, this test could be deleted since other tests (test_csv_has_amount_85_23, test_csv_has_amount_91_03) already verify specific AWS amounts are present, making this partially redundant if those tests pass. The root fix should be clarifying the prompt's \"amazon charges\" instruction to disambiguate retail vs. AWS."}, {"task_id": "6a2e4c53cae99f56e3e572cf", "test_name": "test_csv_has_amount_91_03", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The test checks for $91.03 (an AWS charge) in the CSV, but the task instruction 'don't include amazon charges in the shared file' is ambiguous about whether 'Amazon Web Services' counts as an 'amazon charge.' Both models interpreted it to include AWS. Either: (1) reduce test weight significantly (e.g., to 1) to reflect the ambiguity, or (2) make the test conditional — pass if $91.03 is present OR if all AWS charges are consistently excluded (i.e., none of 85.23, 87.41, 86.18, 85.90, 88.74, 91.03 appear), since excluding all AWS is a coherent interpretation. Option 2 is preferred as it validates consistency regardless of interpretation."}, {"task_id": "6a2e4c53cae99f56e3e572cf", "test_name": "test_csv_row_count", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The instruction 'don't include amazon charges' is genuinely ambiguous — 'Amazon Web Services' contains 'Amazon' and both models defensibly exclude AWS from the CSV. Edit the assertion to accept both interpretations: `assert len(rows) in (7, 13), f'row count {len(rows)} not 7 or 13'`. Alternatively, if only the 13-row interpretation is intended, the task instruction should be clarified to say 'don't include Amazon retail/shopping charges' instead of 'amazon charges', but that is outside the scope of a test-only fix."}, {"task_id": "6a2c83c0ee2598dd305a8185", "test_name": "test_medical_debt_file_not_stale_3600_as_current", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Expand the labeled_original keyword tuple to include additional synonyms for historical/non-current labeling. Change: labeled_original = any(w in line for w in (\"original\", \"starting\", \"initial\", \"on file\", \"was \", \"previous\", \"prior\", \"former\", \"old \", \"last \", \"past \", \"earlier\", \"before\")) — this prevents false failures when a model correctly labels $3,600 as a historical figure using words like \"previous\" or \"prior\" while also using \"balance:\" on the same line."}, {"task_id": "6a2b162e0c2601fcca89a075", "test_name": "test_memory_contains_ssn_last_four", "severity": "major", "categories": "inaccurate_factual_error", "edit_reason": "The test correctly implements the general Label Rules for all dates, but must also account for the workbook's Validation Anchor override on 2026-05-17. The workbook explicitly states that May 17 activity_label should be \"high\" (not \"medium\" as the general rules produce), because Strava activity 1078 is the \"long-walk anchor.\" Fix by adding an override dict before the loop: `LABEL_OVERRIDES = {\"2026-05-17\": \"high\"}` and inside the loop, after computing `expected` from the general rules, add: `expected = LABEL_OVERRIDES.get(row[\"date\"], expected)`. This ensures the test expects \"high\" for May 17 per the Validation Anchors sheet while keeping the general rule checks for all other dates."}, {"task_id": "6a2ef82e16410841a4493140", "test_name": "test_gone_quiet_sheet_has_exact_rows_and_priority_values", "severity": "major", "categories": "too_prescriptive", "edit_reason": "1) Relax the exact row count assertion from `len(records) == 9` to a range such as `7 <= len(records) <= 12` to accommodate valid differences in who qualifies as 'gone quiet.' The strict 60-day rule from task.toml yields 10-11 contacts across all data sources, and reasonable interpretations (excluding daily coworkers, very casual acquaintances) can give 7-12. 2) Make the priority check more flexible: instead of requiring exact strings 'urgent' and 'high', check that a priority/ranking column exists and contains at least two distinct non-empty priority levels (e.g., accept 'critical'/'important', numeric scores, or other valid labeling schemes). Alternatively, remove the priority value assertions entirely since the prompt doesn't request priority labels."}, {"task_id": "6a2ef82e16410841a4493140", "test_name": "test_ranked_sheet_has_exact_rows_and_top_contacts", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "1. Relax the EXPECTED_TOP_RANKED assertions: instead of requiring exact rank positions, check that all three names (nisha kapoor, sanjay desai, anjali rao) appear somewhere in the top 5 of the ranked sheet, without enforcing specific rank ordering among them. 2. Add 'last_real_contact' to the accepted column names in the _find_column call within _ranked_records() (and _gone_quiet_records()) so that column name variants like 'Last Real Contact' are recognized. 3. Consider relaxing the exact row count assertion from == 10 to a range (e.g., 8 <= len(records) <= 14) since the prompt does not specify a count."}, {"task_id": "6a2ef82e16410841a4493140", "test_name": "test_summary_sheet_has_top_actions_section_and_calendar_gap_note", "severity": "major", "categories": "inaccurate_misaligned, too_prescriptive", "edit_reason": "Remove the calendar-gap assertions (assertions 2 and 3) entirely, as the prompt never asks for data-quality observations about calendar gaps. Keep the first assertion but relax it to accept either 'top action' or 'top 3 actions' since the prompt says 'the top action' (singular). The edited test should check: (1) the summary sheet contains an actions/action section (check for 'action' in blob), and optionally (2) the actions section references at least one specific contact or step. Remove: assert 'calendar' in blob and 'gap' in blob; assert 'may 28' in blob."}, {"task_id": "6a2ef82e16410841a4493140", "test_name": "test_gone_quiet_sheet_has_required_columns", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "The test should check for the presence of key conceptual columns (name/contact, some form of last-contact date, days silent/since, suggested action, priority) using a subset/fuzzy match rather than requiring exact column names in exact order. Replace the exact equality assertion with a check that essential columns exist using _find_column-style lookups with multiple accepted synonyms, and verify the sheet has a reasonable number of columns (e.g., >= 5). Remove the requirement for exact column names like 'last_contact_all_sources' and 'caveats' that the prompt never specifies. The column order should not be tested at all."}, {"task_id": "6a2ef82e16410841a4493140", "test_name": "test_ranked_sheet_has_required_columns", "severity": "minor", "categories": "too_prescriptive", "edit_reason": "Replace the strict equality assertion with a check that the ranked sheet contains columns covering the key concepts (name/contact, some recency indicator like last contact or days since, effort/return assessment, and a suggested action). Use a set-based check with multiple accepted synonyms per concept, similar to how _find_column already works with accepted_names lists. For example, verify that at least one column matches each concept group: name/contact/person, last_contact/last_interaction/last_real_contact, days_since/days_silent/days_gap, momentum/trend, effort/effort_to_reconnect, return/potential_return/value, and action/suggested_action/next_step. Do not require e
